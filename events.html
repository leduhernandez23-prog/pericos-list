<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Los Pericos | Events & Catering</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="image_0.png">
    <link rel="icon" type="image/png" href="image_0.png">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --container-bg: #fff;
            --border-color: #e0e0e0;
            --input-border: #ccc;
            --input-bg: #fff;
            --input-text: #333;
            --primary-color: #0056b3; 
            --success-color: #28a745;
            --danger-color: #dc3545;
            --result-text: #666;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --container-bg: #1e1e1e;
            --border-color: #333;
            --input-border: #555;
            --input-bg: #2c2c2c;
            --input-text: #fff;
            --primary-color: #4da3ff;
        }

        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); max-width: 800px; margin: 0 auto; padding: 20px; padding-bottom: 120px; transition: 0.3s; }

        /* PIN LOGIN & SPLASH (Matching Index style) */
        #login-screen, #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); z-index: 9999999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .pin-box { background: var(--container-bg); padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 80%; max-width: 320px; border: 2px solid var(--border-color); }
        .pin-input { width: 100%; font-size: 32px; text-align: center; letter-spacing: 15px; padding: 15px; border-radius: 12px; border: 2px solid var(--primary-color); background: var(--input-bg); color: var(--text-color); margin: 20px 0; }
        .pin-btn { background: var(--primary-color); color: white; border: none; padding: 15px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        .splash-logo { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--primary-color); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); } 70% { transform: scale(1); } 100% { transform: scale(0.95); } }

        /* NAVIGATION & HEADER */
        .app-nav { text-align: center; margin-bottom: 20px; }
        .nav-link { display: inline-block; background-color: var(--primary-color); color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .user-badge { background: #e8f5e9; color: #155724; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid var(--success-color); }
        body.dark-mode .user-badge { background: #1b3a22; color: #81c784; }

        /* UI CARDS & FORMS */
        .item-card { background: var(--container-bg); border-radius: 16px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.06); margin-bottom: 15px; border: 1px solid var(--border-color); }
        .form-group { margin-bottom: 15px; }
        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: var(--result-text); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--input-border); border-radius: 10px; background: var(--input-bg); color: var(--input-text); box-sizing: border-box; font-family: inherit; font-size: 15px; }
        
        .file-upload-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--bg-color); border: 2px dashed var(--border-color); padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; color: var(--primary-color); }
        
        /* BOTTOM TABS */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 12px; z-index: 1000; }
        body.dark-mode .bottom-nav { background: rgba(30, 30, 30, 0.9); }
        .nav-btn { flex: 1; border: none; background: transparent; color: var(--result-text); font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-btn.active { color: var(--primary-color); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        .app-section { display: none; }
        .active-section { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="pin-box">
            <img src="image_0.png" alt="Logo" style="width:80px; border-radius:50%; margin-bottom:15px;">
            <h2 style="margin:0;">Staff Access</h2>
            <p style="font-size:14px; color:var(--result-text);">Caterings & Reservations</p>
            <input type="password" id="pin-input" class="pin-input" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="pin-btn" onclick="verifyPin()">Unlock</button>
        </div>
    </div>

    <div id="splash-screen" style="display:none;">
        <img src="image_0.png" alt="Logo" class="splash-logo">
        <div style="margin-top:20px; font-weight:bold; letter-spacing:2px;">LOADING DATABASE...</div>
    </div>

    <div id="app-content" style="display:none;">
        <div class="app-nav">
            <a href="index.html" class="nav-link">⬅ Back to Inventory App</a>
        </div>

        <div class="header">
            <h1 style="margin:0; font-size:24px;">EVENTS MANAGER</h1>
            <div id="user-badge" class="user-badge">👤 Guest</div>
        </div>

        <div id="section-add" class="app-section active-section">
            <div class="item-card">
                <form id="eventForm">
                    <div style="display:flex; justify-content:center; gap:20px; margin-bottom:20px;">
                        <label><input type="radio" name="eType" value="Catering" checked> Catering</label>
                        <label><input type="radio" name="eType" value="Reservation"> Reservation</label>
                    </div>

                    <div class="form-group"><label>Customer Name</label><input type="text" id="cName" required></div>
                    <div class="row">
                        <div class="form-group"><label>Phone</label><input type="tel" id="cPhone" required></div>
                        <div class="form-group"><label>Guests</label><input type="number" id="cGuests" required></div>
                    </div>
                    <div class="form-group"><label>Date</label><input type="date" id="eDate" required></div>
                    <div class="row">
                        <div class="form-group"><label>Start Time</label><input type="time" id="eStart" required></div>
                        <div class="form-group"><label>End Time</label><input type="time" id="eEnd"></div>
                    </div>

                    <div class="form-group">
                        <label>Ticket Photo</label>
                        <label class="file-upload-btn" for="fileInput">📷 Tap to Upload Ticket</label>
                        <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;">
                        <div id="preview-box" style="display:none; text-align:center; margin-top:10px;">
                            <img id="img-preview" style="max-width:100%; border-radius:10px; max-height:200px; border:1px solid var(--border-color);">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Payment</label>
                        <button type="button" id="payToggle" style="width:100%; padding:15px; border-radius:12px; border:none; font-weight:bold; color:white; background:var(--danger-color); cursor:pointer;">UNPAID</button>
                        <input type="hidden" id="isPaid" value="false">
                    </div>

                    <div class="form-group"><label>Notes</label><textarea id="eNotes" rows="3"></textarea></div>
                    <button type="submit" class="pin-btn" id="saveBtn" style="background:var(--success-color);">💾 Save to Cloud</button>
                </form>
            </div>
        </div>

        <div id="section-board" class="app-section">
            <div id="event-list">
                <p style="text-align:center; color:var(--result-text);">Fetching live bookings...</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" id="btn-add" onclick="switchTab('add')"><span class="nav-icon">📅</span><span>Add New</span></button>
        <button class="nav-btn" id="btn-board" onclick="switchTab('board')"><span class="nav-icon">📋</span><span>Dashboard</span></button>
        <button class="nav-btn" onclick="location.reload()"><span class="nav-icon">🔄</span><span>Sync</span></button>
    </div>

    <script>
        // --- FIREBASE INITIALIZATION ---
        const config = {
            apiKey: "AIzaSyAOO73pfw9yyyukquyOJfjs2nPNQn__XLM",
            authDomain: "los-pericos-46378.firebaseapp.com",
            databaseURL: "https://los-pericos-46378-default-rtdb.firebaseio.com",
            projectId: "los-pericos-46378",
            storageBucket: "los-pericos-46378.appspot.com"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const storage = firebase.storage();

        const TEAM_PINS = { "8096": "Jorge", "0623": "Luis H", "6660": "Elias", "1116": "Stephanie", "0523": "Luis M" };
        let activeUser = localStorage.getItem('p_user');
        let currentLocation = localStorage.getItem('p_loc') || 'LP_Willis';

        function verifyPin() {
            let pin = document.getElementById('pin-input').value;
            if (TEAM_PINS[pin]) {
                activeUser = TEAM_PINS[pin];
                localStorage.setItem('p_user', activeUser);
                startApp();
            } else { alert("❌ Invalid PIN"); }
        }

        function startApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('splash-screen').style.display = 'flex';
            document.getElementById('user-badge').innerText = `👤 ${activeUser} | ${currentLocation.replace('_',' ')}`;
            
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            }, 1500);
        }

        if(activeUser) startApp();

        // --- TAB SWITCHING ---
        function switchTab(tab) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active-section'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + tab).classList.add('active-section');
            document.getElementById('btn-' + tab).classList.add('active');
            if(tab === 'board') loadBoard();
        }

        // --- FORM LOGIC ---
        document.getElementById('payToggle').onclick = function() {
            let hidden = document.getElementById('isPaid');
            let isPaid = hidden.value === 'true';
            hidden.value = isPaid ? 'false' : 'true';
            this.innerText = isPaid ? 'UNPAID' : 'PAID';
            this.style.background = isPaid ? 'var(--danger-color)' : 'var(--success-color)';
        };

        document.getElementById('fileInput').onchange = function(e) {
            let file = e.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = e => { document.getElementById('img-preview').src = e.target.result; document.getElementById('preview-box').style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('eventForm').onsubmit = async function(e) {
            e.preventDefault();
            let btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = "☁️ Uploading...";

            try {
                let url = ""; 
                let file = document.getElementById('fileInput').files[0];
                if (file) {
                    let ref = storage.ref().child(`tickets/${currentLocation}/${Date.now()}_${file.name}`);
                    await ref.put(file);
                    url = await ref.getDownloadURL();
                }

                await db.ref(currentLocation + '/events').push({
                    createdBy: activeUser,
                    customer: document.getElementById('cName').value,
                    phone: document.getElementById('cPhone').value,
                    headcount: document.getElementById('cGuests').value,
                    date: document.getElementById('eDate').value,
                    start: document.getElementById('eStart').value,
                    end: document.getElementById('eEnd').value,
                    type: document.querySelector('input[name="eType"]:checked').value,
                    isPaid: document.getElementById('isPaid').value === 'true',
                    notes: document.getElementById('eNotes').value,
                    photo: url,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                alert("✅ Saved Successfully!");
                location.reload();
            } catch(err) { alert("❌ Error: " + err.message); btn.disabled = false; btn.innerText = "💾 Save to Cloud"; }
        };

        // --- DASHBOARD LOGIC ---
        function loadBoard() {
            db.ref(currentLocation + '/events').on('value', snap => {
                let data = snap.val();
                let container = document.getElementById('event-list');
                container.innerHTML = '';
                if(!data) { container.innerHTML = '<p style="text-align:center;">No events booked.</p>'; return; }

                let sorted = Object.keys(data).map(k => ({id:k, ...data[k]})).sort((a,b) => new Date(a.date) - new Date(b.date));

                sorted.forEach(ev => {
                    let card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:11px; font-weight:bold; color:var(--primary-color);">${ev.type.toUpperCase()}</span>
                            <span style="font-size:11px; font-weight:bold; color:${ev.isPaid?'green':'red'}">${ev.isPaid?'PAID':'UNPAID'}</span>
                        </div>
                        <h3 style="margin:5px 0;">${ev.customer}</h3>
                        <div style="font-size:13px; color:var(--result-text); line-height:1.6;">
                            📅 ${ev.date} | 👥 ${ev.headcount} Guests<br>⏰ ${ev.start} - ${ev.end || '??'}<br>📞 ${ev.phone}
                        </div>
                        <div style="margin-top:10px; display:flex; gap:10px;">
                            ${ev.photo ? `<a href="${ev.photo}" target="_blank" class="nav-link" style="font-size:11px; padding:6px 12px; background:#f1f5f9; color:#333; border:1px solid #ddd;">View Ticket</a>` : ''}
                            <button onclick="deleteEvent('${ev.id}')" style="font-size:11px; padding:6px 12px; background:none; border:none; color:var(--danger-color); cursor:pointer; font-weight:bold;">🗑️ Delete</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        function deleteEvent(id) { if(confirm("Permanently delete this event?")) db.ref(currentLocation+'/events/'+id).remove(); }
    </script>
</body>
</html>
