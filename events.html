<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Los Pericos | Events & Catering</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        /* =========================================
           CSS VARIABLES (Color Palette)
           ========================================= */
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --container-bg: #fff;
            --border-color: #e0e0e0;
            --primary-color: #2563eb; 
            --primary-hover: #1d4ed8;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --text-muted: #64748b;
            --toggle-bg: #f1f5f9;
            --input-bg: #fcfcfc;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #f1f5f9;
            --container-bg: #1e293b;
            --border-color: #334155;
            --input-bg: #0f172a;
            --toggle-bg: #111827;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            transition: background-color 0.3s, color 0.3s; 
        }

        .card {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 550px;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        /* PIN LOGIN & SPLASH */
        #login-screen, #splash-screen, #upload-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-color: var(--bg-color); z-index: 9999999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
        }
        
        .pin-box { background: var(--container-bg); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--border-color); width: 85%; max-width: 340px; }
        .pin-input { width: 100%; font-size: 32px; text-align: center; letter-spacing: 15px; padding: 15px; border-radius: 12px; border: 2px solid var(--primary-color); background: var(--input-bg); color: var(--text-color); margin: 20px 0; box-sizing: border-box; }
        
        .pulse-logo { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--primary-color); animation: pulse-ring 1.5s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(37, 99, 235, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }

        /* HEADER & NAV */
        .header-controls { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #location-switcher { padding: 8px 12px; border-radius: 8px; border: 2px solid var(--border-color); background: var(--container-bg); color: var(--text-color); font-weight: bold; cursor: pointer; display: none; }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .logo-group { display: flex; align-items: center; gap: 15px; }
        .logo { width: 48px; height: 48px; border-radius: 12px; background-color: var(--primary-color); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }

        .user-badge { font-size: 13px; font-weight: bold; color: var(--primary-color); text-align: center; background: rgba(37, 99, 235, 0.1); padding: 8px 12px; border-radius: 20px; display: inline-block; margin-bottom: 20px;}

        /* TABS */
        .tab-nav { display: flex; background: var(--toggle-bg); padding: 5px; border-radius: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: var(--text-muted); font-size: 14px; }
        .tab-btn.active { background-color: var(--container-bg); color: var(--primary-color); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }

        /* FORM */
        .type-toggle { display: flex; background: var(--toggle-bg); padding: 5px; border-radius: 10px; margin-bottom: 25px; }
        .type-toggle input { display: none; }
        .type-label { flex: 1; text-align: center; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--text-muted); }
        .type-toggle input:checked + .type-label { background: var(--container-bg); color: var(--primary-color); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .form-group { margin-bottom: 20px; }
        .row { display: flex; gap: 20px; }
        .row > div { flex: 1; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--input-bg); color: var(--text-color); box-sizing: border-box; }

        /* IMAGE UPLOAD */
        .file-upload-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--input-bg); color: var(--primary-color); padding: 15px; border-radius: 8px; border: 2px dashed var(--border-color); cursor: pointer; font-weight: 600; }
        #imagePreviewContainer { display: none; margin-top: 15px; text-align: center; background: var(--input-bg); padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); }
        #imagePreview { max-width: 100%; max-height: 250px; border-radius: 6px; }

        /* PAYMENT BUTTON */
        .payment-toggle { width: 100%; padding: 15px; font-size: 16px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; color: white; text-transform: uppercase; }
        .unpaid { background-color: var(--danger-color); }
        .paid { background-color: var(--success-color); }

        .submit-btn { width: 100%; background: var(--primary-color); color: white; padding: 16px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; }

        /* BOARD ITEMS */
        .event-item { border-bottom: 1px solid var(--border-color); padding: 20px 0; position: relative; }
        .del-btn { position: absolute; right: 0; top: 20px; background: none; border: none; cursor: pointer; font-size: 18px; }
        .status-pill { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; cursor: pointer; border: none; margin-bottom: 10px; color: white; }
        .action-link { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; font-size: 12px; font-weight: bold; text-decoration: none; color: var(--primary-color); padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); margin-right: 5px; }
        
        .weekend-warning { display: none; background: rgba(239, 68, 68, 0.1); color: var(--danger-color); padding: 12px; border-radius: 8px; border: 1px dashed var(--danger-color); font-size: 13px; font-weight: bold; margin-bottom: 20px; text-align: center; }

        .feed-item { padding: 12px 0; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .feed-user { font-weight: bold; color: var(--primary-color); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="pin-box">
            <img src="image_0.png" style="width:80px; border-radius:50%; margin-bottom:15px;">
            <h2 style="margin:0;">Staff Access</h2>
            <input type="password" id="pin-input" class="pin-input" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="submit-btn" onclick="verifyPin()">Unlock Events</button>
            <p id="pin-error" style="color:var(--danger-color); display:none; margin-top:10px;">❌ Invalid PIN</p>
        </div>
    </div>

    <div id="upload-overlay" style="display:none; opacity:0; transition: opacity 0.3s;">
        <img src="image_0.png" id="upload-logo-img" class="pulse-logo">
        <h2 id="upload-status-text" style="margin-top:20px;">Saving Booking...</h2>
    </div>

    <div class="card" id="app-container" style="display:none;">
        <div class="header-controls">
            <a href="index.html" style="text-decoration:none; font-weight:bold; color:var(--text-muted);">⬅ Back</a>
            <select id="location-switcher" onchange="switchLocation(this.value)">
                <option value="LP_Willis">📍 LP Willis</option>
                <option value="LP_Huntsville">📍 LP Huntsville</option>
            </select>
        </div>

        <div class="header">
            <div class="logo-group">
                <div class="logo"><img src="image_0.png"></div>
                <div class="header-text">
                    <h2 style="margin:0;">Los Pericos Events</h2>
                    <p style="margin:0; font-size:12px; color:var(--text-muted);">Manage caterings & reservations</p>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle" onclick="toggleDarkMode()">
                <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg id="sunIcon" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle></svg>
            </button>
        </div>

        <div style="text-align:center;">
            <div id="user-display" class="user-badge">👤 Loading...</div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchView('add')" id="btn-add">➕ Add</button>
            <button class="tab-btn" onclick="switchView('board')" id="btn-board">📋 Board</button>
            <button class="tab-btn" onclick="switchView('activity')" id="btn-activity">📝 Activity</button>
        </div>

        <form id="eventForm" onsubmit="return false;">
            <div class="type-toggle">
                <input type="radio" id="catering" name="eventType" value="Catering" checked>
                <label for="catering" class="type-label">Catering</label>
                <input type="radio" id="reservation" name="eventType" value="Reservation">
                <label for="reservation" class="type-label">Reservation</label>
            </div>

            <div class="form-group"><label>Customer Name</label><input type="text" id="customerName" required></div>
            <div class="row">
                <div class="form-group"><label>Phone</label><input type="tel" id="customerPhone" required></div>
                <div class="form-group"><label>Guests</label><input type="number" id="headcount" required></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Date</label><input type="date" id="eventDate" required onchange="checkWeekendWarning()"></div>
                <div class="form-group"><label>Start Time</label><input type="time" id="startTime" required onchange="checkWeekendWarning()"></div>
            </div>
            <div id="weekendWarning" class="weekend-warning">⚠️ Not a Reservation just a heads up</div>

            <div id="catering-fields">
                <div class="form-group">
                    <label>Ticket Photo</label>
                    <label class="file-upload-btn" for="ticketImage">📷 Tap to Upload</label>
                    <input type="file" id="ticketImage" accept="image/*">
                    <div id="imagePreviewContainer"><img id="imagePreview"><br><button type="button" onclick="removeImg()" style="color:red; background:none; border:none; cursor:pointer; margin-top:5px; font-weight:bold;">✖ Remove</button></div>
                </div>
                <div class="form-group">
                    <label>Payment Status</label>
                    <input type="hidden" id="isPaid" value="false">
                    <button type="button" id="paymentBtn" class="payment-toggle unpaid" onclick="togglePayment()">Unpaid</button>
                </div>
            </div>

            <div class="form-group"><label>Special Notes</label><textarea id="notes" rows="3"></textarea></div>
            <button type="button" class="submit-btn" onclick="handleFormSubmit()">Save Booking</button>
        </form>

        <div id="boardView" style="display:none;">
            <input type="text" id="eventSearch" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--border-color); margin-bottom:15px; box-sizing:border-box; background:var(--input-bg); color:var(--text-color);" placeholder="🔍 Search customers..." onkeyup="filterEvents(this.value)">
            <div id="event-list"></div>
        </div>

        <div id="activityView" style="display:none;">
            <div id="activity-list" style="background:var(--toggle-bg); padding:15px; border-radius:12px; border:1px solid var(--border-color);"></div>
        </div>
    </div>

    <script>
       // --- FIREBASE CONFIG ---
        const config = {
            apiKey: "AIzaSyAOO73pfw9yyyukquyOJfjs2nPNQn__XLM",
            authDomain: "los-pericos-46378.firebaseapp.com",
            databaseURL: "https://los-pericos-46378-default-rtdb.firebaseio.com",
            projectId: "los-pericos-46378",
            storageBucket: "los-pericos-46378.firebasestorage.app",
            messagingSenderId: "463221124647",
            appId: "1:463221124647:web:5e54ad293b174992096802"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const storage = firebase.storage();

        const TEAM_PINS = {
            "8096": { name: "Jorge", role: "Manager", location: "LP_Willis" },
            "0623": { name: "Luis H", role: "Manager", location: "LP_Willis" },
            "6660": { name: "Elias", role: "Manager", location: "LP_Huntsville" },
            "1116": { name: "Stephanie", role: "Owner", location: "All" },
            "0523": { name: "Luis M", role: "Owner", location: "All" }
        };

        let activeUser = localStorage.getItem('pericos_active_user');
        let activeRole = localStorage.getItem('pericos_active_role');
        let currentLocation = localStorage.getItem('pericos_location') || 'LP_Willis';

        // ADDED FIREBASE AUTH CHECK SO SECURITY RULES DON'T BLOCK THE SAVE
        firebase.auth().onAuthStateChanged((user) => {
            if (user && activeUser) {
                startApp();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        function verifyPin() {
            let pin = document.getElementById('pin-input').value;
            if (TEAM_PINS[pin]) {
                // ADDED AUTHENTICATION HANDSHAKE HERE
                firebase.auth().signInAnonymously().then(() => {
                    activeUser = TEAM_PINS[pin].name;
                    activeRole = TEAM_PINS[pin].role;
                    localStorage.setItem('pericos_active_user', activeUser);
                    localStorage.setItem('pericos_active_role', activeRole);
                    document.getElementById('pin-error').style.display = 'none';
                    startApp();
                }).catch((error) => {
                    console.error(error);
                    alert("Connection error connecting to Security Vault. Please try again.");
                });
            } else { 
                document.getElementById('pin-error').style.display = 'block'; 
            }
        }

        function startApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            
            document.getElementById('user-display').innerText = `👤 ${activeUser} | ${currentLocation.replace('_',' ')}`;
            
            const locSwitcher = document.getElementById('location-switcher');
            locSwitcher.value = currentLocation;
            if(activeRole === 'Owner') {
                locSwitcher.style.display = 'inline-block';
            } else {
                locSwitcher.style.display = 'none';
            }

            if (localStorage.getItem('restaurantCalcDarkMode') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('moonIcon').style.display = 'none';
                document.getElementById('sunIcon').style.display = 'block';
            }
        }

        function switchLocation(loc) {
            currentLocation = loc;
            localStorage.setItem('pericos_location', loc);
            location.reload();
        }

        function switchView(view) {
            document.getElementById('eventForm').style.display = view === 'add' ? 'block' : 'none';
            document.getElementById('boardView').style.display = view === 'board' ? 'block' : 'none';
            document.getElementById('activityView').style.display = view === 'activity' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + view).classList.add('active');
            if(view === 'board') loadBoard();
            if(view === 'activity') loadActivity();
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('restaurantCalcDarkMode', isDark);
            document.getElementById('moonIcon').style.display = isDark ? 'none' : 'block';
            document.getElementById('sunIcon').style.display = isDark ? 'block' : 'none';
        }

        // --- FORM LOGIC ---
        const cateringFields = document.getElementById('catering-fields');
        document.querySelectorAll('input[name="eventType"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                if(e.target.value === 'Reservation') {
                    cateringFields.style.display = 'none';
                } else {
                    cateringFields.style.display = 'block';
                }
            });
        });

        const tIn = document.getElementById('ticketImage');
        tIn.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => { document.getElementById('imagePreview').src = ev.target.result; document.getElementById('imagePreviewContainer').style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        };
        function removeImg() { tIn.value = ''; document.getElementById('imagePreviewContainer').style.display = 'none'; }

        function togglePayment() {
            const b = document.getElementById('paymentBtn');
            const i = document.getElementById('isPaid');
            const isP = i.value === 'true';
            i.value = !isP;
            b.innerText = !isP ? 'Paid' : 'Unpaid';
            b.className = 'payment-toggle ' + (!isP ? 'paid' : 'unpaid');
        }

        function checkWeekendWarning() {
            const dInput = document.getElementById('eventDate').value;
            const tInput = document.getElementById('startTime').value;
            if(!dInput || !tInput) return;
            const d = new Date(dInput.replace(/-/g, '\/'));
            const h = parseInt(tInput.split(':')[0]);
            const day = d.getDay();
            const isWarn = (day === 5 || day === 6) || (day === 0 && h >= 11 && h < 14);
            document.getElementById('weekendWarning').style.display = isWarn ? 'block' : 'none';
        }

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = ev => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let scale = 600 / Math.max(img.width, img.height);
                        if (scale > 1) scale = 1; // Don't scale up small images
                        canvas.width = img.width * scale; 
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.4);
                    };
                };
            });
        }

        function logEventAction(actionText) {
            if(!activeUser) return;
            let now = new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
            db.ref(currentLocation + '/events_logs').push({
                user: activeUser,
                action: actionText,
                time: now,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        async function handleFormSubmit() {
            const custName = document.getElementById('customerName').value;
            const eventDate = document.getElementById('eventDate').value;
            const startTime = document.getElementById('startTime').value;

            if(!custName || !eventDate || !startTime) { 
                alert("Please fill out the Customer Name, Date, and Start Time."); 
                return; 
            }

            const overlay = document.getElementById('upload-overlay');
            const status = document.getElementById('upload-status-text');
            const logo = document.getElementById('upload-logo-img');
            
            overlay.style.display = 'flex';
            setTimeout(() => overlay.style.opacity = '1', 10);
            logo.className = 'pulse-logo';
            status.style.color = 'var(--text-color)';
            status.innerText = "Saving Booking...";

            try {
                const eventType = document.querySelector('input[name="eventType"]:checked').value;
                const isCatering = eventType === 'Catering';
                const file = tIn.files[0];
                const eventRef = db.ref(currentLocation + '/events').push();
                const id = eventRef.key;
                let isPaidStatus = document.getElementById('isPaid').value === 'true';

                // 1. SAVE TEXT DATA FIRST
                await eventRef.set({
                    type: eventType,
                    customer: custName,
                    phone: document.getElementById('customerPhone').value,
                    guests: document.getElementById('headcount').value,
                    date: eventDate,
                    start: startTime,
                    isPaid: isPaidStatus,
                    notes: document.getElementById('notes').value,
                    photo: (isCatering && file) ? "uploading" : "",
                    createdBy: activeUser,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                logEventAction(`Added a new ${eventType} for ${custName}`);

                // 2. CRUNCH IMAGE IN MEMORY
                let compressedBlob = null;
                if(isCatering && file) {
                    status.innerText = "Optimizing photo...";
                    compressedBlob = await compressImage(file);
                }

                // 3. SHOW SUCCESS INSTANTLY
                status.innerText = "✅ Booking Saved!";
                status.style.color = "var(--success-color)";
                logo.style.animation = "none";
                logo.style.borderColor = "var(--success-color)";
                
                // 4. FIRE CLOUD UPLOAD IN BACKGROUND (DO NOT AWAIT)
                if(compressedBlob) {
                    const sRef = storage.ref().child(`tickets/${currentLocation}/${Date.now()}_ticket.jpg`);
                    sRef.put(compressedBlob).then(async snap => {
                        const url = await snap.ref.getDownloadURL();
                        db.ref(currentLocation + '/events/' + id).update({ photo: url });
                        logEventAction(`Ticket photo uploaded for ${custName}`);
                    }).catch(err => {
                        console.error("Background upload failed:", err);
                        db.ref(currentLocation + '/events/' + id).update({ photo: "" });
                    });
                }

                // 5. DISMISS
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        status.style.color = "var(--text-color)";
                        logo.style.borderColor = "var(--primary-color)";
                        
                        document.getElementById('eventForm').reset();
                        paymentBtn.className = 'payment-toggle unpaid';
                        paymentBtn.textContent = 'Unpaid';
                        document.getElementById('isPaid').value = 'false';
                        removeImg();
                        document.getElementById('weekendWarning').style.display = 'none';
                        
                        switchView('board');
                    }, 300);
                }, 1500);

            } catch(e) { 
                console.error(e);
                alert("Error saving event. Please check your connection."); 
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 300);
            }
        }

        // --- BOARD & LOGS ---
        function loadBoard() {
            const list = document.getElementById('event-list');
            list.innerHTML = "<p style='text-align:center; color:gray;'>Fetching from cloud...</p>";
            
            const today = new Date();
            today.setHours(0,0,0,0);

            db.ref(currentLocation + '/events').on('value', snap => {
                let html = '';
                let arr = [];
                snap.forEach(c => {
                    let ev = c.val();
                    if(ev.date) {
                        const [y, m, d] = ev.date.split('-');
                        const evDate = new Date(y, m - 1, d);
                        if (evDate < today) {
                            db.ref(currentLocation + '/events/' + c.key).remove();
                            return; 
                        }
                    }
                    arr.push({ id: c.key, ...ev });
                });
                
                arr.sort((a,b) => new Date(a.date) - new Date(b.date));
                
                if(arr.length === 0) {
                    list.innerHTML = "<p style='text-align:center; color:gray;'>No upcoming bookings.</p>";
                    return;
                }

                arr.forEach(ev => {
                    let pillHtml = '';
                    if (ev.type === 'Catering') {
                        const paidClass = ev.isPaid ? 'paid' : 'unpaid';
                        const paidText = ev.isPaid ? '✅ PAID' : '❌ UNPAID';
                        const safeName = ev.customer.replace(/'/g, "\\'");
                        pillHtml = `<button onclick="togglePaymentBoard('${ev.id}', ${ev.isPaid}, '${safeName}')" class="status-pill ${paidClass}">${paidText}</button>`;
                    }

                    html += `
                    <div class="event-item">
                        <button class="del-btn" onclick="deleteEv('${ev.id}','${ev.customer.replace(/'/g, "\\'")}')">🗑️</button>
                        ${pillHtml}
                        <div style="font-weight:bold; font-size:18px;">${ev.customer}</div>
                        <div style="color:var(--primary-color); font-size:12px; font-weight:bold; margin-bottom: 5px;">${ev.type.toUpperCase()}</div>
                        <div style="font-size:14px; color:var(--text-muted); line-height:1.5;">
                            📅 ${ev.date} @ ${ev.start}<br>
                            👥 ${ev.guests} Guests | 👤 ${ev.createdBy}
                        </div>
                        ${ev.notes ? `<div style="background:var(--toggle-bg); padding:10px; border-radius:8px; margin-top:10px; font-size:13px;"><b>Notes:</b> ${ev.notes}</div>` : ''}
                        <div style="margin-top:10px; display:flex; gap:10px;">
                            ${ev.photo === "uploading" ? '<span class="action-link" style="opacity:0.5;">⌛ UPLOADING...</span>' : (ev.photo ? `<a href="${ev.photo}" target="_blank" class="action-link">📄 TICKET</a>` : '')}
                            <a href="tel:${ev.phone}" class="action-link">📞 CALL</a>
                        </div>
                    </div>`;
                });
                list.innerHTML = html;
                filterEvents(document.getElementById('eventSearch').value);
            });
        }

        window.togglePaymentBoard = (id, currentStatus, name) => {
            let newStatus = !currentStatus;
            db.ref(currentLocation + '/events/' + id).update({ isPaid: newStatus });
            logEventAction(`Marked ${name} as ${newStatus ? 'PAID' : 'UNPAID'}`);
        };

        window.deleteEv = (id, name) => { 
            if(confirm("Delete " + name + "?")) {
                db.ref(currentLocation+'/events/'+id).remove(); 
                logEventAction(`Deleted event for ${name}`);
            }
        };

        function loadActivity() {
            const list = document.getElementById('activity-list');
            list.innerHTML = "<p style='text-align:center; color:gray;'>Fetching logs...</p>";
            
            db.ref(currentLocation + '/events_logs').limitToLast(20).on('value', snap => {
                let html = '';
                snap.forEach(c => {
                    let l = c.val();
                    html = `<div class="feed-item"><div class="feed-header"><span class="feed-user">👤 ${l.user}</span><span>${l.time}</span></div><div class="feed-action">${l.action}</div></div>` + html;
                });
                list.innerHTML = html || "<p style='text-align:center; color:gray;'>No activity yet.</p>";
            });
        }

        function filterEvents(q) {
            const query = q.toLowerCase();
            document.querySelectorAll('.event-item').forEach(item => {
                const name = item.querySelector('.board-cust-name').innerText.toLowerCase();
                item.style.display = name.includes(query) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
