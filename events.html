<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Pericos | Events & Catering</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        /* =========================================
           CSS VARIABLES (Color Palette)
           ========================================= */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #fcfcfc;
            --toggle-bg: #f1f5f9;
            --toggle-active: #ffffff;
            --danger: #ef4444;
            --success: #10b981;
            --theme-transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        body.dark-mode {
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
            --toggle-bg: #111827;
            --toggle-active: #334155;
        }

        /* =========================================
           CORE LAYOUT & TYPOGRAPHY
           ========================================= */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            transition: var(--theme-transition);
        }

        .card {
            background-color: var(--surface);
            width: 100%;
            max-width: 550px;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0,0,0,0.02);
            transition: var(--theme-transition);
        }

        body.dark-mode .card { box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); }

        /* =========================================
           PIN LOGIN & SPLASH SCREEN
           ========================================= */
        #login-screen, #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-color: var(--bg); z-index: 9999999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
        }
        #splash-screen { z-index: 999999; transition: opacity 0.6s ease-out; }
        
        .pin-box { background: var(--surface); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); width: 85%; max-width: 340px; }
        .pin-input { width: 100%; font-size: 32px; text-align: center; letter-spacing: 15px; padding: 15px; border-radius: 12px; border: 2px solid var(--primary); background: var(--input-bg); color: var(--text-main); margin: 20px 0; box-sizing: border-box; }
        
        .splash-logo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--primary); animation: pulse-ring 1.5s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(37, 99, 235, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }

        /* =========================================
           HEADER & LOGO AREA
           ========================================= */
        .app-nav { text-align: center; margin-bottom: 25px; }
        .app-nav a { display: inline-block; background-color: var(--text-muted); color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; transition: background-color 0.3s; }
        .app-nav a:hover { opacity: 0.9; }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .logo-group { display: flex; align-items: center; gap: 15px; }
        
        .logo { width: 48px; height: 48px; min-width: 48px; border-radius: 12px; background-color: var(--primary); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }

        .header-text h2 { margin: 0; font-size: 20px; font-weight: 700; color: var(--text-main); transition: var(--theme-transition); }
        .header-text p { margin: 2px 0 0 0; color: var(--text-muted); font-size: 14px; transition: var(--theme-transition); }
        
        .theme-toggle { background: none; border: 1px solid var(--border); color: var(--text-muted); width: 42px; height: 42px; min-width: 42px; flex-shrink: 0; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; }
        .theme-toggle:hover { border-color: var(--primary); color: var(--primary); background-color: rgba(37, 99, 235, 0.05); }
        body.dark-mode .theme-toggle:hover { background-color: rgba(37, 99, 235, 0.1); }

        .header-controls { width: 100%; max-width: 550px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        #location-switcher { padding: 8px 12px; border-radius: 8px; border: 2px solid var(--border); background: var(--surface); color: var(--text-main); font-weight: bold; font-size: 14px; outline: none; cursor: pointer; }
        #location-switcher:hover { border-color: var(--primary); }

        /* =========================================
           TAB NAVIGATION
           ========================================= */
        .tab-nav { display: flex; background: var(--toggle-bg); padding: 5px; border-radius: 10px; margin-bottom: 25px; transition: var(--theme-transition); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: var(--text-muted); font-size: 14px; transition: all 0.3s ease; }
        .tab-btn.active { background-color: var(--toggle-active); color: var(--primary); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
        body.dark-mode .tab-btn.active { box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3); }

        /* =========================================
           FORM ELEMENTS
           ========================================= */
        .type-toggle { display: flex; background-color: var(--toggle-bg); padding: 5px; border-radius: 10px; margin-bottom: 25px; transition: var(--theme-transition); }
        .type-toggle input[type="radio"] { display: none; }
        .type-label { flex: 1; text-align: center; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--text-muted); transition: all 0.3s ease; font-size: 15px; }
        .type-toggle input[type="radio"]:checked + .type-label { background-color: var(--toggle-active); color: var(--primary); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
        body.dark-mode .type-toggle input[type="radio"]:checked + .type-label { box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3); }

        .form-group { margin-bottom: 20px; }
        .row { display: flex; gap: 20px; }
        .row > div { flex: 1; }

        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-main); font-size: 14px; transition: var(--theme-transition); }
        input, select, textarea { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 15px; color: var(--text-main); background-color: var(--input-bg); transition: var(--theme-transition), box-shadow 0.2s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .search-bar { margin-bottom: 20px; font-weight: 500; }

        /* =========================================
           IMAGE UPLOAD & PREVIEW
           ========================================= */
        .file-upload-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background-color: var(--input-bg); color: var(--primary); padding: 15px; border-radius: 8px; border: 2px dashed var(--border); cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .file-upload-btn:hover { background-color: var(--toggle-bg); border-color: var(--primary); }
        input[type="file"] { display: none; }

        #imagePreviewContainer { display: none; margin-top: 15px; text-align: center; background-color: var(--input-bg); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        #imagePreview { max-width: 100%; max-height: 250px; border-radius: 6px; object-fit: contain; display: block; margin: 0 auto; }
        .remove-img-btn { background: none; border: none; color: var(--danger); cursor: pointer; margin-top: 10px; font-weight: 600; font-size: 14px; padding: 8px 16px; border-radius: 6px; transition: background-color 0.2s; }
        .remove-img-btn:hover { background-color: rgba(239, 68, 68, 0.1); }

        /* Buttons */
        .payment-toggle { width: 100%; padding: 15px; font-size: 16px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s; color: white; text-transform: uppercase; letter-spacing: 1px; }
        .unpaid { background-color: var(--danger); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }
        .paid { background-color: var(--success); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }

        .submit-btn { width: 100%; background-color: var(--primary); color: white; padding: 16px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: background-color 0.3s, transform 0.1s; }
        .submit-btn:hover { background-color: var(--primary-hover); }

        /* Board & Feed */
        .event-item { border-bottom: 1px solid var(--border); padding: 20px 0; position: relative; }
        .del-btn { position: absolute; right: 0; top: 20px; color: var(--danger); background: none; border: none; cursor: pointer; font-size: 18px; }
        .status-pill { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; cursor: pointer; border: none; margin-bottom: 10px; color: white; }
        .action-link { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; font-size: 12px; font-weight: bold; text-decoration: none; color: var(--primary); padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); margin-right: 5px;}
        .user-badge { font-size: 13px; font-weight: bold; color: var(--primary); text-align: center; background: rgba(37, 99, 235, 0.1); padding: 6px 12px; border-radius: 20px; }

        .weekend-warning { display: none; background: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 12px; border-radius: 8px; border: 1px dashed var(--danger); font-size: 13px; font-weight: bold; margin-bottom: 20px; text-align: center; }

        .feed-item { display: flex; flex-direction: column; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .feed-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .feed-user { font-weight: bold; color: var(--primary); }
        .feed-action { font-size: 14px; color: var(--text-main); }

        /* UPLOAD OVERLAY */
        #upload-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg); z-index: 9999999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .upload-logo { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--primary); animation: pulse-ring 1.5s infinite; margin-bottom: 25px; }
        .upload-logo.success { animation: none; border-color: var(--success); }
        .upload-status { font-size: 20px; font-weight: bold; color: var(--text-main); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="pin-box">
            <img src="image_0.png" style="width:80px; border-radius:50%; margin-bottom:15px;">
            <h2 style="margin:0;">Staff Access</h2>
            <input type="password" id="pin-input" class="pin-input" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="submit-btn" onclick="verifyPin()">Unlock Events</button>
            <p id="pin-error" style="color:var(--danger); display:none;">❌ Invalid PIN</p>
        </div>
    </div>

    <div id="splash-screen" style="display:none;">
        <img src="image_0.png" class="splash-logo">
        <div class="splash-text">Syncing...</div>
    </div>

    <div id="upload-overlay" style="display:none;">
        <img src="image_0.png" id="upload-logo-img" class="upload-logo">
        <div id="upload-status-text" class="upload-status">Processing...</div>
    </div>

    <div class="card" id="app-container" style="display:none;">
        <div class="header-controls">
            <a href="index.html" style="text-decoration:none; font-weight:bold; color:var(--text-muted);">⬅ Back to Inventory</a>
            <select id="location-switcher" onchange="switchLocation(this.value)">
                <option value="LP_Willis">📍 LP Willis</option>
                <option value="LP_Huntsville">📍 LP Huntsville</option>
            </select>
        </div>

        <div class="header">
            <div class="logo-group">
                <div class="logo"><img src="image_0.png"></div>
                <div class="header-text">
                    <h2>Los Pericos Events</h2>
                    <p>Manage caterings & reservations</p>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle">
                <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg id="sunIcon" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle></svg>
            </button>
        </div>

        <div style="text-align:center; margin-bottom: 20px;"><div id="user-display" class="user-badge">👤 Loading...</div></div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchView('add')" id="btn-add">➕ Add Event</button>
            <button class="tab-btn" onclick="switchView('board')" id="btn-board">📋 View Board</button>
            <button class="tab-btn" onclick="switchView('activity')" id="btn-activity">📝 Activity</button>
        </div>

        <form id="eventForm">
            <div class="type-toggle">
                <input type="radio" id="catering" name="eventType" value="Catering" checked>
                <label for="catering" class="type-label">Catering</label>
                <input type="radio" id="reservation" name="eventType" value="Reservation">
                <label for="reservation" class="type-label">Reservation</label>
            </div>
            <div class="form-group"><label>Customer Name</label><input type="text" id="customerName" required></div>
            <div class="row">
                <div class="form-group"><label>Phone</label><input type="tel" id="customerPhone" required></div>
                <div class="form-group"><label>Guests</label><input type="number" id="headcount" required></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Date</label><input type="date" id="eventDate" required onchange="checkWeekendWarning()"></div>
                <div class="form-group"><label>Start Time</label><input type="time" id="startTime" required onchange="checkWeekendWarning()"></div>
            </div>
            <div id="weekendWarning" class="weekend-warning">⚠️ Not a Reservation just a heads up</div>

            <div id="catering-fields">
                <div class="form-group">
                    <label>Ticket Photo</label>
                    <label class="file-upload-btn" for="ticketImage">📷 Tap to Upload</label>
                    <input type="file" id="ticketImage" accept="image/*">
                    <div id="imagePreviewContainer"><img id="imagePreview"><button type="button" class="remove-img-btn" id="removeImageBtn">✖ Remove</button></div>
                </div>
                <div class="form-group">
                    <label>Payment Status</label>
                    <input type="hidden" id="isPaid" value="false">
                    <button type="button" id="paymentBtn" class="payment-toggle unpaid">Unpaid</button>
                </div>
            </div>
            <div class="form-group"><label>Special Notes</label><textarea id="notes" rows="3"></textarea></div>
            <button type="submit" class="submit-btn" id="submitEventBtn">Save Booking</button>
        </form>

        <div id="boardView" style="display:none;">
            <h2>Booking Board</h2>
            <input type="text" id="eventSearch" class="search-bar" placeholder="🔍 Search..." onkeyup="filterEvents(this.value)">
            <div id="event-list"></div>
        </div>

        <div id="activityView" style="display:none;">
            <h2>Recent Activity</h2>
            <div id="activity-list"></div>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE SETUP ---
        const config = {
            apiKey: "AIzaSyAOO73pfw9yyyukquyOJfjs2nPNQn__XLM",
            authDomain: "los-pericos-46378.firebaseapp.com",
            databaseURL: "https://los-pericos-46378-default-rtdb.firebaseio.com",
            projectId: "los-pericos-46378",
            storageBucket: "los-pericos-46378.appspot.com"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const storage = firebase.storage();

        const TEAM_PINS = { "8096": "Jorge", "0623": "Luis H", "6660": "Elias", "1116": "Stephanie", "0523": "Luis M" };
        let activeUser = localStorage.getItem('pericos_active_user');
        let activeRole = localStorage.getItem('pericos_active_role');
        let currentLocation = localStorage.getItem('pericos_location') || 'LP_Willis';

        // --- 2. AUTH & LOCATION ---
        function verifyPin() {
            let pin = document.getElementById('pin-input').value;
            if (TEAM_PINS[pin]) {
                activeUser = TEAM_PINS[pin];
                activeRole = (pin === "1116" || pin === "0523") ? 'Owner' : 'Manager';
                localStorage.setItem('pericos_active_user', activeUser);
                localStorage.setItem('pericos_active_role', activeRole);
                startApp();
            } else { document.getElementById('pin-error').style.display = 'block'; }
        }

        function startApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            document.getElementById('user-display').innerText = `👤 ${activeUser} | ${currentLocation.replace('_',' ')}`;
            document.getElementById('location-switcher').value = currentLocation;
        }
        if(activeUser) startApp();

        function switchLocation(loc) {
            currentLocation = loc;
            localStorage.setItem('pericos_location', loc);
            location.reload();
        }

        // --- 3. VIEW LOGIC ---
        function switchView(view) {
            document.getElementById('eventForm').style.display = view === 'add' ? 'block' : 'none';
            document.getElementById('boardView').style.display = view === 'board' ? 'block' : 'none';
            document.getElementById('activityView').style.display = view === 'activity' ? 'block' : 'none';
            document.getElementById('btn-add').classList.toggle('active', view === 'add');
            document.getElementById('btn-board').classList.toggle('active', view === 'board');
            document.getElementById('btn-activity').classList.toggle('active', view === 'activity');
            if(view === 'board') loadBoard();
            if(view === 'activity') loadActivity();
        }

        // --- 4. IMAGE LOGIC ---
        const ticketInput = document.getElementById('ticketImage');
        const previewImg = document.getElementById('imagePreview');
        const previewCont = document.getElementById('imagePreviewContainer');

        ticketInput.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => { previewImg.src = ev.target.result; previewCont.style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        };

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = ev => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const scale = 600 / Math.max(img.width, img.height);
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.4);
                    };
                };
            });
        }

        // --- 5. SAVE LOGIC ---
        document.getElementById('eventForm').onsubmit = async (e) => {
            e.preventDefault();
            const overlay = document.getElementById('upload-overlay');
            const status = document.getElementById('upload-status-text');
            const logo = document.getElementById('upload-logo-img');
            
            overlay.style.display = 'flex';
            setTimeout(() => overlay.style.opacity = '1', 10);
            status.innerText = "Saving data...";

            try {
                const type = document.querySelector('input[name="eventType"]:checked').value;
                const cust = document.getElementById('customerName').value;
                const file = ticketInput.files[0];
                const eventRef = db.ref(currentLocation + '/events').push();
                const id = eventRef.key;

                // 1. Save Text Immediately
                await eventRef.set({
                    type, customer: cust, phone: document.getElementById('customerPhone').value,
                    guests: document.getElementById('headcount').value, date: document.getElementById('eventDate').value,
                    start: document.getElementById('startTime').value, isPaid: document.getElementById('isPaid').value === 'true',
                    notes: document.getElementById('notes').value, photo: file ? "uploading" : "",
                    createdBy: activeUser, timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                // 2. Upload Photo (Actually wait for it to start before dismissing)
                if(file) {
                    status.innerText = "Compressing Photo...";
                    const blob = await compressImage(file);
                    status.innerText = "Uploading Ticket...";
                    const storageRef = storage.ref().child(`tickets/${currentLocation}/${Date.now()}.jpg`);
                    
                    // Fire-and-forget background update
                    storageRef.put(blob).then(async snap => {
                        const url = await snap.ref.getDownloadURL();
                        db.ref(currentLocation + '/events/' + id).update({ photo: url });
                    });
                }

                status.innerText = "✅ Booking Saved!";
                logo.classList.add('success');
                db.ref(currentLocation + '/events_logs').push({ user: activeUser, action: `Added ${type} for ${cust}`, time: new Date().toLocaleString() });

                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        document.getElementById('eventForm').reset();
                        previewCont.style.display = 'none';
                        logo.classList.remove('success');
                        switchView('board');
                    }, 300);
                }, 1000);

            } catch(err) { alert("Error!"); console.error(err); overlay.style.display = 'none'; }
        };

        // --- 6. BOARD & ACTIVITY ---
        function loadBoard() {
            const list = document.getElementById('event-list');
            list.innerHTML = "Syncing...";
            db.ref(currentLocation + '/events').on('value', snap => {
                let html = '';
                const today = new Date().toISOString().split('T')[0];
                let arr = [];
                snap.forEach(c => {
                    let ev = c.val();
                    if(ev.date < today) { db.ref(currentLocation + '/events/' + c.key).remove(); return; }
                    arr.push({ id: c.key, ...ev });
                });
                arr.sort((a,b) => a.date.localeCompare(b.date));
                arr.forEach(ev => {
                    html += `
                    <div class="event-item">
                        <button class="del-btn" onclick="deleteEv('${ev.id}')">🗑️</button>
                        <div style="font-weight:bold;">${ev.customer} (${ev.type})</div>
                        <div style="font-size:14px; color:gray;">📅 ${ev.date} @ ${ev.start} | 👥 ${ev.guests}</div>
                        <div style="margin-top:10px;">
                            ${ev.photo === "uploading" ? '<span class="action-link" style="opacity:0.5;">⌛ UPLOADING...</span>' : 
                             (ev.photo ? `<a href="${ev.photo}" target="_blank" class="action-link">📄 TICKET</a>` : '')}
                            <a href="tel:${ev.phone}" class="action-link">📞 CALL</a>
                        </div>
                    </div>`;
                });
                list.innerHTML = html || "No upcoming events.";
            });
        }

        window.deleteEv = (id) => { if(confirm("Delete?")) db.ref(currentLocation+'/events/'+id).remove(); };

        function loadActivity() {
            const list = document.getElementById('activity-list');
            db.ref(currentLocation + '/events_logs').limitToLast(20).on('value', snap => {
                let html = '';
                snap.forEach(c => {
                    let l = c.val();
                    html = `<div class="feed-item"><div class="feed-header"><span class="feed-user">${l.user}</span><span>${l.time}</span></div><div>${l.action}</div></div>` + html;
                });
                list.innerHTML = html;
            });
        }

        function checkWeekendWarning() {
            const d = new Date(document.getElementById('eventDate').value.replace(/-/g, '\/'));
            const h = parseInt(document.getElementById('startTime').value.split(':')[0]);
            const day = d.getDay();
            const isWarn = (day === 5 || day === 6) || (day === 0 && h >= 11 && h < 14);
            document.getElementById('weekendWarning').style.display = isWarn ? 'block' : 'none';
        }

        document.getElementById('paymentBtn').onclick = () => {
            const b = document.getElementById('paymentBtn');
            const i = document.getElementById('isPaid');
            i.value = i.value === 'true' ? 'false' : 'true';
            b.innerText = i.value === 'true' ? 'Paid' : 'Unpaid';
            b.className = 'payment-toggle ' + (i.value === 'true' ? 'paid' : 'unpaid');
        };

        const themeToggle = document.getElementById('themeToggle');
        themeToggle.onclick = () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('moonIcon').style.display = isDark ? 'none' : 'block';
            document.getElementById('sunIcon').style.display = isDark ? 'block' : 'none';
        };
    </script>
</body>
</html>
