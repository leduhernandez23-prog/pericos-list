<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Los Pericos | Events & Catering</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        /* Shared Styles to match your Index.html */
        :root {
            --bg-color: #f4f4f9; --text-color: #333; --container-bg: #fff;
            --primary-color: #0056b3; --success-color: #28a745; --danger-color: #dc3545;
            --border-color: #e0e0e0; --input-bg: #fff;
        }
        body.dark-mode {
            --bg-color: #121212; --text-color: #e0e0e0; --container-bg: #1e1e1e;
            --border-color: #333; --input-bg: #2c2c2c;
        }
        body { font-family: system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-color); max-width: 800px; margin: 0 auto; padding: 20px; padding-bottom: 100px; transition: 0.3s; }
        
        .app-switcher { text-align: center; margin-bottom: 20px; }
        .switch-btn { display: inline-block; background: #666; color: white; padding: 10px 20px; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 14px; }
        
        .item-card { background: var(--container-bg); border-radius: 16px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.06); border: 1px solid var(--border-color); margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--input-bg); color: var(--text-color); box-sizing: border-box; font-size: 15px; }
        
        .tabs { display: flex; justify-content: center; border-bottom: 2px solid var(--border-color); margin-bottom: 20px; }
        .tab-btn { background: none; border: none; padding: 12px 24px; cursor: pointer; font-size: 16px; font-weight: bold; color: #999; }
        .tab-btn.active { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); margin-bottom: -2px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 15px; }
        body.dark-mode .bottom-nav { background: rgba(30,30,30,0.9); }
    </style>
</head>
<body>

    <div class="app-switcher">
        <a href="index.html" class="switch-btn">⬅ Back to Inventory App</a>
    </div>

    <div id="section-add" class="app-section">
        <div class="item-card">
            <h2 style="margin-top:0;">📅 New Booking</h2>
            <form id="eventForm">
                <div class="form-group"><label>Customer</label><input type="text" id="cName" required></div>
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1;"><label>Phone</label><input type="tel" id="cPhone" required></div>
                    <div class="form-group" style="flex:1;"><label>Guests</label><input type="number" id="cGuests" required></div>
                </div>
                <div class="form-group"><label>Date</label><input type="date" id="eDate" required></div>
                <div class="form-group">
                    <label class="file-upload-btn" for="fileInput" style="display:block; text-align:center; padding:15px; border:2px dashed var(--border-color); border-radius:10px; cursor:pointer; color:var(--primary-color); font-weight:bold;">📷 Upload Ticket Photo</label>
                    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;">
                </div>
                <button type="submit" id="saveBtn" style="width:100%; padding:15px; background:var(--success-color); color:white; border:none; border-radius:12px; font-weight:bold; font-size:16px;">💾 Save Event</button>
            </form>
        </div>
    </div>

    <div id="section-board" class="app-section" style="display:none;">
        <div id="event-list"></div>
    </div>

    <div class="bottom-nav">
        <button onclick="showTab('add')" style="border:none; background:none; font-weight:bold; color:var(--primary-color);">➕ ADD</button>
        <button onclick="showTab('board')" style="border:none; background:none; font-weight:bold; color:var(--text-color);">📋 BOARD</button>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyAOO73pfw9yyyukquyOJfjs2nPNQn__XLM",
            authDomain: "los-pericos-46378.firebaseapp.com",
            databaseURL: "https://los-pericos-46378-default-rtdb.firebaseio.com",
            projectId: "los-pericos-46378",
            storageBucket: "los-pericos-46378.appspot.com"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const storage = firebase.storage();

        let activeUser = localStorage.getItem('pericos_active_user') || 'Manager';
        let currentLocation = localStorage.getItem('pericos_location') || 'LP_Willis';

        function showTab(tab) {
            document.getElementById('section-add').style.display = tab === 'add' ? 'block' : 'none';
            document.getElementById('section-board').style.display = tab === 'board' ? 'block' : 'none';
            if(tab === 'board') loadBoard();
        }

        document.getElementById('eventForm').onsubmit = async (e) => {
            e.preventDefault();
            let btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerText = "Saving...";
            let url = ""; let file = document.getElementById('fileInput').files[0];
            if(file) {
                let ref = storage.ref().child(`tickets/${currentLocation}/${Date.now()}`);
                await ref.put(file); url = await ref.getDownloadURL();
            }
            await db.ref(currentLocation + '/events').push({
                customer: document.getElementById('cName').value, phone: document.getElementById('cPhone').value,
                headcount: document.getElementById('cGuests').value, date: document.getElementById('eDate').value,
                photo: url, createdBy: activeUser, timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            alert("Saved!"); location.reload();
        };

        function loadBoard() {
            db.ref(currentLocation + '/events').on('value', snap => {
                let html = ''; snap.forEach(child => {
                    let ev = child.val();
                    html += `<div class="item-card"><b>${ev.customer}</b><br>${ev.date} | ${ev.headcount} Guests<br>${ev.photo ? `<a href="${ev.photo}" target="_blank">View Photo</a>` : ''}</div>`;
                });
                document.getElementById('event-list').innerHTML = html || 'No events.';
            });
        }

        if(localStorage.getItem('restaurantCalcDarkMode') === 'true') document.body.classList.add('dark-mode');
    </script>
</body>
</html>
