<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Pericos | Events & Catering</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #fcfcfc;
            --danger: #ef4444;
            --success: #10b981;
        }

        body.dark-mode {
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .card {
            background-color: var(--surface);
            width: 100%;
            max-width: 550px;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        /* TAB NAVIGATION */
        .tab-nav {
            display: flex;
            background: var(--border);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 550px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.2s;
        }
        .tab-btn.active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* FORM ELEMENTS */
        .form-group { margin-bottom: 20px; }
        .row { display: flex; gap: 20px; }
        .row > div { flex: 1; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input, select, textarea { 
            width: 100%; padding: 12px 15px; border: 1px solid var(--border); 
            border-radius: 10px; background-color: var(--input-bg); 
            color: var(--text-main); font-family: inherit; box-sizing: border-box;
        }

        .file-upload-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background-color: var(--input-bg); color: var(--primary); padding: 15px;
            border-radius: 10px; border: 2px dashed var(--border); cursor: pointer; font-weight: 700;
        }

        .submit-btn {
            width: 100%; background-color: var(--primary); color: white; padding: 16px;
            font-size: 16px; font-weight: 700; border: none; border-radius: 12px;
            cursor: pointer; transition: 0.2s;
        }
        .submit-btn:hover { background-color: var(--primary-hover); transform: translateY(-1px); }

        /* BOARD CARDS */
        .event-card {
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            position: relative;
        }
        .event-card:last-child { border: none; }
        .delete-btn {
            position: absolute; top: 20px; right: 0;
            background: none; border: none; color: var(--danger);
            cursor: pointer; font-size: 18px;
        }
        .view-btn {
            display: inline-block; padding: 8px 16px; background: var(--bg);
            color: var(--text-main); text-decoration: none; border-radius: 8px;
            font-size: 12px; font-weight: 700; border: 1px solid var(--border);
            margin-top: 10px;
        }

        .payment-status {
            font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 6px;
            text-transform: uppercase;
        }
        .status-paid { background: #dcfce7; color: #166534; }
        .status-unpaid { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">⬅ Back to Inventory</a>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchView('add')">➕ Add Event</button>
        <button class="tab-btn" onclick="switchView('board')">📋 View Board</button>
    </div>

    <div id="view-add" class="card">
        <h2 style="margin-top:0;">New Booking</h2>
        <form id="eventForm">
            <div class="form-group">
                <label>Event Type</label>
                <select id="eType">
                    <option value="Catering">Catering</option>
                    <option value="Reservation">Reservation</option>
                </select>
            </div>
            <div class="form-group"><label>Customer Name</label><input type="text" id="cName" required></div>
            <div class="row">
                <div class="form-group"><label>Phone Number</label><input type="tel" id="cPhone" required></div>
                <div class="form-group"><label>Total Guests</label><input type="number" id="cGuests" required></div>
            </div>
            <div class="form-group"><label>Date of Event</label><input type="date" id="eDate" required></div>
            <div class="form-group">
                <label class="file-upload-btn" for="fileInput">📷 Tap to Upload Ticket</label>
                <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;">
                <div id="preview-box" style="display:none; text-align:center; margin-top:10px;">
                    <img id="img-preview" style="max-width:100%; border-radius:10px; max-height:200px;">
                </div>
            </div>
            <div class="form-group">
                <label>Payment Status</label>
                <select id="isPaid">
                    <option value="false">❌ Unpaid</option>
                    <option value="true">✅ Paid</option>
                </select>
            </div>
            <div class="form-group"><label>Notes</label><textarea id="eNotes" rows="3"></textarea></div>
            <button type="submit" class="submit-btn" id="saveBtn">Save to Database</button>
        </form>
    </div>

    <div id="view-board" class="card" style="display:none;">
        <h2 style="margin-top:0;">Live Booking Board</h2>
        <div id="event-list">Loading...</div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const config = {
            apiKey: "AIzaSyAOO73pfw9yyyukquyOJfjs2nPNQn__XLM",
            authDomain: "los-pericos-46378.firebaseapp.com",
            databaseURL: "https://los-pericos-46378-default-rtdb.firebaseio.com",
            projectId: "los-pericos-46378",
            storageBucket: "los-pericos-46378.appspot.com"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const storage = firebase.storage();

        const activeUser = localStorage.getItem('pericos_active_user') || 'Manager';
        const currentLocation = localStorage.getItem('pericos_location') || 'LP_Willis';

        // --- NAVIGATION ---
        function switchView(view) {
            document.getElementById('view-add').style.display = view === 'add' ? 'block' : 'none';
            document.getElementById('view-board').style.display = view === 'board' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(view === 'board') loadBoard();
        }

        // --- FORM LOGIC ---
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => { 
                    document.getElementById('img-preview').src = ev.target.result;
                    document.getElementById('preview-box').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('eventForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = "☁️ Uploading...";

            try {
                let url = ""; 
                const file = document.getElementById('fileInput').files[0];
                if (file) {
                    const ref = storage.ref().child(`tickets/${currentLocation}/${Date.now()}`);
                    await ref.put(file);
                    url = await ref.getDownloadURL();
                }

                await db.ref(currentLocation + '/events').push({
                    customer: document.getElementById('cName').value,
                    phone: document.getElementById('cPhone').value,
                    guests: document.getElementById('cGuests').value,
                    date: document.getElementById('eDate').value,
                    type: document.getElementById('eType').value,
                    isPaid: document.getElementById('isPaid').value === 'true',
                    notes: document.getElementById('eNotes').value,
                    photo: url,
                    createdBy: activeUser,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                alert("✅ Booking Saved!");
                location.reload();
            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false; btn.innerText = "Save to Database";
            }
        };

        // --- BOARD LOGIC ---
        function loadBoard() {
            const container = document.getElementById('event-list');
            db.ref(currentLocation + '/events').on('value', snap => {
                let html = '';
                if(!snap.exists()) { container.innerHTML = '<p>No bookings found.</p>'; return; }
                
                snap.forEach(child => {
                    const ev = child.val();
                    const statusClass = ev.isPaid ? 'status-paid' : 'status-unpaid';
                    html += `
                        <div class="event-card">
                            <button onclick="deleteEvent('${child.key}')" class="delete-btn">🗑️</button>
                            <span class="payment-status ${statusClass}">${ev.isPaid ? 'Paid' : 'Unpaid'}</span>
                            <div style="font-size:12px; color:var(--primary); font-weight:800; margin: 8px 0 2px 0;">${ev.type.toUpperCase()}</div>
                            <b style="font-size:18px;">${ev.customer}</b>
                            <div style="font-size:14px; color:var(--text-muted); margin-top:5px;">
                                📅 ${ev.date} | 👥 ${ev.guests} Guests | 📞 ${ev.phone}
                            </div>
                            ${ev.photo ? `<a href="${ev.photo}" target="_blank" class="view-btn">📄 View Ticket</a>` : ''}
                        </div>`;
                });
                container.innerHTML = html;
            });
        }

        window.deleteEvent = (id) => {
            if(confirm("Permanently delete this booking?")) {
                db.ref(currentLocation + '/events/' + id).remove();
            }
        };

        if(localStorage.getItem('restaurantCalcDarkMode') === 'true') document.body.classList.add('dark-mode');
    </script>
</body>
</html>
