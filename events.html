<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Pericos | Events & Catering</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        :root {
            --primary: #0056b3;
            --bg: #f4f4f9;
            --surface: #ffffff;
            --text-main: #333;
            --text-muted: #666;
            --border: #e0e0e0;
            --input-bg: #fff;
            --danger: #dc3545;
            --success: #28a745;
        }

        body.dark-mode {
            --bg: #121212;
            --surface: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #aaa;
            --border: #333;
            --input-bg: #2c2c2c;
            --primary: #4da3ff;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        /* SPLASH SCREEN */
        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-color: var(--bg); z-index: 999999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: opacity 0.6s ease-out; 
        }
        .splash-logo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--primary); animation: pulse-ring 2s infinite; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .splash-text { margin-top: 30px; font-size: 18px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; }
        @keyframes pulse-ring { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 86, 179, 0.4); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0, 86, 179, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 86, 179, 0); } }

        .card {
            background-color: var(--surface);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .tab-nav {
            display: flex;
            background: var(--border);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 550px;
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: var(--text-muted);
        }
        .tab-btn.active {
            background: var(--surface); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid var(--border); 
            border-radius: 10px; background-color: var(--input-bg); 
            color: var(--text-main); font-family: inherit; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; background-color: var(--primary); color: white; padding: 16px;
            font-size: 16px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer;
        }

        .event-item { border-bottom: 1px solid var(--border); padding: 15px 0; position: relative; }
        .event-item:last-child { border: none; }
        .del-btn { position: absolute; right: 0; top: 15px; color: var(--danger); background: none; border: none; cursor: pointer; font-size: 18px; }
        
        .user-badge { font-size: 12px; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="image_0.png" alt="Logo" class="splash-logo">
        <div class="splash-text">Opening Events...</div>
    </div>

    <div style="margin-bottom: 20px;">
        <a href="index.html" style="text-decoration:none; font-weight:bold; color:var(--text-muted);">⬅ BACK TO INVENTORY</a>
    </div>

    <div id="user-display" class="user-badge">👤 Checking User...</div>

    <div class="tab-nav">
        <button class="tab-btn active" id="btn-add" onclick="switchTab('add')">➕ ADD EVENT</button>
        <button class="tab-btn" id="btn-board" onclick="switchTab('board')">📋 VIEW BOARD</button>
    </div>

    <div id="view-add" class="card">
        <h2 style="margin-top:0;">New Booking</h2>
        <form id="eventForm">
            <div class="form-group"><label>Customer Name</label><input type="text" id="cName" required></div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <div style="flex:1;"><label>Phone</label><input type="tel" id="cPhone" required></div>
                <div style="flex:1;"><label>Guests</label><input type="number" id="cGuests" required></div>
            </div>
            <div class="form-group"><label>Event Date</label><input type="date" id="eDate" required></div>
            <div class="form-group">
                <label style="display:block; text-align:center; padding:15px; border:2px dashed var(--border); border-radius:10px; cursor:pointer; color:var(--primary); font-weight:bold;">
                    📷 UPLOAD TICKET PHOTO
                    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;">
                </label>
            </div>
            <div class="form-group">
                <label>Payment</label>
                <select id="isPaid">
                    <option value="false">❌ Unpaid</option>
                    <option value="true">✅ Paid</option>
                </select>
            </div>
            <button type="submit" class="submit-btn" id="saveBtn">Save to Cloud</button>
        </form>
    </div>

    <div id="view-board" class="card" style="display:none;">
        <h2 style="margin-top:0;">Booking Board</h2>
        <div id="event-list">Loading...</div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyAOO73pfw9yyyukquyOJfjs2nPNQn__XLM",
            authDomain: "los-pericos-46378.firebaseapp.com",
            databaseURL: "https://los-pericos-46378-default-rtdb.firebaseio.com",
            projectId: "los-pericos-46378",
            storageBucket: "los-pericos-46378.appspot.com"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const storage = firebase.storage();

        // SHARED KEYS FROM YOUR NEW INDEX.HTML
        const activeUser = localStorage.getItem('pericos_active_user');
        const currentLocation = localStorage.getItem('pericos_location') || 'LP_Willis';

        // SECURITY REDIRECT (If not logged in, go back to login on index)
        if(!activeUser) { window.location.href = "index.html"; }
        document.getElementById('user-display').innerText = `👤 ${activeUser} | ${currentLocation.replace('_', ' ')}`;

        function switchTab(tab) {
            document.getElementById('view-add').style.display = tab === 'add' ? 'block' : 'none';
            document.getElementById('view-board').style.display = tab === 'board' ? 'block' : 'none';
            document.getElementById('btn-add').classList.toggle('active', tab === 'add');
            document.getElementById('btn-board').classList.toggle('active', tab === 'board');
            if(tab === 'board') loadBoard();
        }

        document.getElementById('eventForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerText = "Saving...";
            let url = ""; 
            const file = document.getElementById('fileInput').files[0];
            try {
                if (file) {
                    const ref = storage.ref().child(`tickets/${currentLocation}/${Date.now()}`);
                    await ref.put(file); url = await ref.getDownloadURL();
                }
                await db.ref(currentLocation + '/events').push({
                    customer: document.getElementById('cName').value,
                    phone: document.getElementById('cPhone').value,
                    guests: document.getElementById('cGuests').value,
                    date: document.getElementById('eDate').value,
                    isPaid: document.getElementById('isPaid').value === 'true',
                    photo: url, createdBy: activeUser, timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                alert("✅ Event Saved!"); location.reload();
            } catch (err) { alert("Error saving."); btn.disabled = false; }
        };

        function loadBoard() {
            const list = document.getElementById('event-list');
            db.ref(currentLocation + '/events').on('value', snap => {
                let html = '';
                if(!snap.exists()) { list.innerHTML = 'No bookings.'; return; }
                snap.forEach(child => {
                    const ev = child.val();
                    html += `
                        <div class="event-item">
                            <button onclick="deleteEvent('${child.key}')" class="del-btn">🗑️</button>
                            <b style="font-size:18px;">${ev.customer}</b><br>
                            <span style="font-size:13px; color:var(--text-muted);">📅 ${ev.date} | 👤 ${ev.createdBy}</span><br>
                            ${ev.photo ? `<a href="${ev.photo}" target="_blank" style="color:var(--primary); font-size:12px; font-weight:bold; text-decoration:none; display:inline-block; margin-top:5px;">📄 VIEW TICKET</a>` : ''}
                        </div>`;
                });
                list.innerHTML = html;
            });
        }

        window.deleteEvent = (id) => { if(confirm("Delete this event?")) db.ref(currentLocation+'/events/'+id).remove(); };

        // SYNC DARK MODE & HIDE SPLASH
        if(localStorage.getItem('restaurantCalcDarkMode') === 'true') document.body.classList.add('dark-mode');
        window.onload = () => { setTimeout(() => { 
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 600);
        }, 800); };
    </script>
</body>
</html>
