<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Pericos | Events & Catering</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        /* =========================================
           CSS VARIABLES (Color Palette)
           ========================================= */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #fcfcfc;
            --toggle-bg: #f1f5f9;
            --toggle-active: #ffffff;
            --danger: #ef4444;
            --success: #10b981;
            --theme-transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        body.dark-mode {
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
            --toggle-bg: #111827;
            --toggle-active: #334155;
        }

        /* =========================================
           CORE LAYOUT & TYPOGRAPHY
           ========================================= */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            transition: var(--theme-transition);
        }

        .card {
            background-color: var(--surface);
            width: 100%;
            max-width: 550px;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0,0,0,0.02);
            transition: var(--theme-transition);
        }

        body.dark-mode .card { box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); }

        /* =========================================
           PIN LOGIN & SPLASH SCREEN
           ========================================= */
        #login-screen, #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-color: var(--bg); z-index: 9999999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
        }
        #splash-screen { z-index: 999999; transition: opacity 0.6s ease-out; }
        
        .pin-box { background: var(--surface); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); width: 85%; max-width: 340px; }
        .pin-input { width: 100%; font-size: 32px; text-align: center; letter-spacing: 15px; padding: 15px; border-radius: 12px; border: 2px solid var(--primary); background: var(--input-bg); color: var(--text-main); margin: 20px 0; box-sizing: border-box; }
        
        .splash-logo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--primary); animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(37, 99, 235, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }

        /* =========================================
           APP SWITCHER NAVIGATION
           ========================================= */
        .app-nav { text-align: center; margin-bottom: 25px; }
        .app-nav a { display: inline-block; background-color: var(--text-muted); color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; transition: background-color 0.3s; }
        .app-nav a:hover { opacity: 0.9; }

        /* =========================================
           HEADER & LOGO AREA (FIXED SIZES)
           ========================================= */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .logo-group { display: flex; align-items: center; gap: 15px; }
        
        .logo { width: 48px; height: 48px; min-width: 48px; border-radius: 12px; background-color: var(--primary); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }

        .header-text h2 { margin: 0; font-size: 20px; font-weight: 700; color: var(--text-main); transition: var(--theme-transition); }
        .header-text p { margin: 2px 0 0 0; color: var(--text-muted); font-size: 14px; transition: var(--theme-transition); }
        
        .theme-toggle { background: none; border: 1px solid var(--border); color: var(--text-muted); width: 42px; height: 42px; min-width: 42px; flex-shrink: 0; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; }
        .theme-toggle:hover { border-color: var(--primary); color: var(--primary); background-color: rgba(37, 99, 235, 0.05); }
        body.dark-mode .theme-toggle:hover { background-color: rgba(37, 99, 235, 0.1); }

        .header-controls { width: 100%; max-width: 550px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        #location-switcher { padding: 8px 12px; border-radius: 8px; border: 2px solid var(--border); background: var(--surface); color: var(--text-main); font-weight: bold; font-size: 14px; outline: none; cursor: pointer; }
        #location-switcher:hover { border-color: var(--primary); }

        /* =========================================
           TAB NAVIGATION
           ========================================= */
        .tab-nav { display: flex; background: var(--toggle-bg); padding: 5px; border-radius: 10px; margin-bottom: 25px; transition: var(--theme-transition); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: var(--text-muted); font-size: 15px; transition: all 0.3s ease; }
        .tab-btn.active { background-color: var(--toggle-active); color: var(--primary); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
        body.dark-mode .tab-btn.active { box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3); }

        /* =========================================
           FORM ELEMENTS
           ========================================= */
        .type-toggle { display: flex; background-color: var(--toggle-bg); padding: 5px; border-radius: 10px; margin-bottom: 25px; transition: var(--theme-transition); }
        .type-toggle input[type="radio"] { display: none; }
        .type-label { flex: 1; text-align: center; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--text-muted); transition: all 0.3s ease; font-size: 15px; }
        .type-toggle input[type="radio"]:checked + .type-label { background-color: var(--toggle-active); color: var(--primary); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
        body.dark-mode .type-toggle input[type="radio"]:checked + .type-label { box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3); }

        .form-group { margin-bottom: 20px; }
        .row { display: flex; gap: 20px; }
        .row > div { flex: 1; }

        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-main); font-size: 14px; transition: var(--theme-transition); }
        input, select, textarea { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 15px; color: var(--text-main); background-color: var(--input-bg); transition: var(--theme-transition), box-shadow 0.2s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .search-bar { margin-bottom: 20px; font-weight: 500; }

        /* =========================================
           IMAGE UPLOAD & PREVIEW STYLES
           ========================================= */
        .file-upload-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background-color: var(--input-bg); color: var(--primary); padding: 15px; border-radius: 8px; border: 2px dashed var(--border); cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .file-upload-btn:hover { background-color: var(--toggle-bg); border-color: var(--primary); }
        input[type="file"] { display: none; }

        #imagePreviewContainer { display: none; margin-top: 15px; text-align: center; background-color: var(--input-bg); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        #imagePreview { max-width: 100%; max-height: 250px; border-radius: 6px; object-fit: contain; display: block; margin: 0 auto; }
        .remove-img-btn { background: none; border: none; color: var(--danger); cursor: pointer; margin-top: 10px; font-weight: 600; font-size: 14px; padding: 8px 16px; border-radius: 6px; transition: background-color 0.2s; }
        .remove-img-btn:hover { background-color: rgba(239, 68, 68, 0.1); }

        /* Payment & Submit Buttons */
        .payment-toggle { width: 100%; padding: 15px; font-size: 16px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s; color: white; text-transform: uppercase; letter-spacing: 1px; }
        .unpaid { background-color: var(--danger); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }
        .paid { background-color: var(--success); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }

        .submit-btn { width: 100%; background-color: var(--primary); color: white; padding: 16px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: background-color 0.3s, transform 0.1s; }
        .submit-btn:hover { background-color: var(--primary-hover); }
        .submit-btn:active { transform: scale(0.98); }

        /* =========================================
           BOARD VIEW STYLES
           ========================================= */
        .event-item { border-bottom: 1px solid var(--border); padding: 20px 0; position: relative; }
        .event-item:last-child { border: none; }
        .del-btn { position: absolute; right: 0; top: 20px; color: var(--danger); background: none; border: none; cursor: pointer; font-size: 18px; }
        
        .status-pill { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; cursor: pointer; border: none; margin-bottom: 10px; color: white; }
        .action-link { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; font-size: 12px; font-weight: bold; text-decoration: none; color: var(--primary); padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); margin-right: 5px;}
        
        .user-badge { font-size: 13px; font-weight: bold; color: var(--primary); text-align: center; background: rgba(37, 99, 235, 0.1); padding: 6px 12px; border-radius: 20px; }

        /* Weekend Warning Box */
        .weekend-warning {
            display: none; background: rgba(239, 68, 68, 0.1); color: var(--danger); 
            padding: 12px; border-radius: 8px; border: 1px dashed var(--danger);
            font-size: 13px; font-weight: bold; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="pin-box">
            <img src="image_0.png" style="width:80px; border-radius:50%; margin-bottom:15px;">
            <h2 style="margin:0; color:var(--text-main);">Staff Access</h2>
            <input type="password" id="pin-input" class="pin-input" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="submit-btn" onclick="verifyPin()">Unlock Events</button>
            <p id="pin-error" style="color:var(--danger); display:none; font-weight:bold; margin-top:15px;">❌ Invalid PIN</p>
        </div>
    </div>

    <div id="splash-screen" style="display:none;">
        <img src="image_0.png" alt="Logo" class="splash-logo">
        <div class="splash-text">Syncing...</div>
    </div>

    <div class="card" id="app-container" style="display:none;">
        
        <div class="header-controls">
            <a href="index.html" style="text-decoration:none; font-weight:bold; color:var(--text-muted);">⬅ Back to Inventory</a>
            
            <select id="location-switcher" onchange="switchLocation(this.value)">
                <option value="LP_Willis">📍 LP Willis</option>
                <option value="LP_Huntsville">📍 LP Huntsville</option>
            </select>
        </div>

        <div class="header">
            <div class="logo-group">
                <div class="logo">
                    <img src="image_0.png" alt="Los Pericos Logo">
                </div>
                <div class="header-text">
                    <h2>Los Pericos Events</h2>
                    <p>Manage caterings & reservations</p>
                </div>
            </div>
            
            <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">
                <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg id="sunIcon" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="18.36" x2="5.64" y2="19.78"></line><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line></svg>
            </button>
        </div>

        <div style="text-align:center; margin-bottom: 20px;">
            <div id="user-display" class="user-badge">👤 Loading...</div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" id="btn-add" onclick="switchView('add')">➕ Add Event</button>
            <button class="tab-btn" id="btn-board" onclick="switchView('board')">📋 View Board</button>
        </div>

        <form id="eventForm">
            <div class="type-toggle">
                <input type="radio" id="catering" name="eventType" value="Catering" checked>
                <label for="catering" class="type-label">Catering</label>
                <input type="radio" id="reservation" name="eventType" value="Reservation">
                <label for="reservation" class="type-label">Reservation</label>
            </div>

            <div class="form-group">
                <label for="customerName">Customer Name</label>
                <input type="text" id="customerName" placeholder="e.g. Maria Garcia" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="customerPhone">Phone Number</label>
                    <input type="tel" id="customerPhone" placeholder="555-0198" required>
                </div>
                <div class="form-group">
                    <label for="headcount">Headcount</label>
                    <input type="number" id="headcount" min="1" placeholder="50" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="eventDate">Date</label>
                    <input type="date" id="eventDate" required onchange="checkWeekendWarning()">
                </div>
                <div class="form-group">
                    <label for="startTime">Start Time</label>
                    <input type="time" id="startTime" required onchange="checkWeekendWarning()">
                </div>
            </div>
            
            <div id="weekendWarning" class="weekend-warning">
                ⚠️ Not a Reservation just a heads up
            </div>

            <div id="catering-fields">
                <div class="form-group">
                    <label>Ticket Photo</label>
                    <label class="file-upload-btn" for="ticketImage">
                        📷 Tap to Upload Ticket
                    </label>
                    <input type="file" id="ticketImage" accept="image/*" capture="environment">
                    
                    <div id="imagePreviewContainer">
                        <img id="imagePreview" alt="Ticket Preview">
                        <button type="button" class="remove-img-btn" id="removeImageBtn">✖ Remove Photo</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Payment Status</label>
                    <input type="hidden" id="isPaid" value="false">
                    <button type="button" id="paymentBtn" class="payment-toggle unpaid">Unpaid</button>
                </div>
            </div>

            <div class="form-group">
                <label for="notes">Special Notes</label>
                <textarea id="notes" rows="3" placeholder="Needs chafing dishes, allergies, etc."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitEventBtn">Save Booking</button>
        </form>

        <div id="boardView" style="display:none;">
            <h2 style="margin-top:0; margin-bottom:15px;">Booking Board</h2>
            <input type="text" id="eventSearch" class="search-bar" placeholder="🔍 Search by customer name..." onkeyup="filterEvents(this.value)">
            <div id="event-list">Loading...</div>
        </div>
    </div>

    <script>
        // --- 1. DARK MODE LOGIC ---
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        const moonIcon = document.getElementById('moonIcon');
        const sunIcon = document.getElementById('sunIcon');

        if (localStorage.getItem('restaurantCalcDarkMode') === 'true') enableDarkMode();

        themeToggle.addEventListener('click', () => {
            body.classList.contains('dark-mode') ? disableDarkMode() : enableDarkMode();
        });

        function enableDarkMode() {
            body.classList.add('dark-mode'); localStorage.setItem('restaurantCalcDarkMode', 'true');
            moonIcon.style.display = 'none'; sunIcon.style.display = 'block';
        }
        function disableDarkMode() {
            body.classList.remove('dark-mode'); localStorage.setItem('restaurantCalcDarkMode', 'false');
            moonIcon.style.display = 'block'; sunIcon.style.display = 'none';
        }

        // --- 2. FIREBASE & AUTH LOGIC ---
        const config = {
            apiKey: "AIzaSyAOO73pfw9yyyukquyOJfjs2nPNQn__XLM",
            authDomain: "los-pericos-46378.firebaseapp.com",
            databaseURL: "https://los-pericos-46378-default-rtdb.firebaseio.com",
            projectId: "los-pericos-46378",
            storageBucket: "los-pericos-46378.appspot.com"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const storage = firebase.storage();

        const TEAM_PINS = { "8096": "Jorge", "0623": "Luis H", "6660": "Elias", "1116": "Stephanie", "0523": "Luis M" };
        let activeUser = localStorage.getItem('pericos_active_user');
        let activeRole = localStorage.getItem('pericos_active_role');
        let currentLocation = localStorage.getItem('pericos_location') || 'LP_Willis';

        function verifyPin() {
            let pin = document.getElementById('pin-input').value;
            if (TEAM_PINS[pin]) {
                activeUser = TEAM_PINS[pin].name;
                activeRole = TEAM_PINS[pin].role;
                localStorage.setItem('pericos_active_user', activeUser);
                localStorage.setItem('pericos_active_role', activeRole);
                document.getElementById('pin-error').style.display = 'none';
                startApp();
            } else { 
                document.getElementById('pin-error').style.display = 'block'; 
            }
        }

        function startApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('splash-screen').style.display = 'flex';
            
            document.getElementById('user-display').innerText = `👤 ${activeUser} | ${currentLocation.replace('_',' ')}`;
            
            // Owner Location Switcher Logic
            const locSwitcher = document.getElementById('location-switcher');
            locSwitcher.value = currentLocation;
            if(activeRole !== 'Owner') {
                locSwitcher.disabled = true;
                locSwitcher.style.opacity = '0.5';
                locSwitcher.style.cursor = 'not-allowed';
            }

            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'block';
                }, 600);
            }, 800);
        }

        if(activeUser) startApp();

        function switchLocation(loc) {
            currentLocation = loc;
            localStorage.setItem('pericos_location', loc);
            // Show splash and reload to sync everything cleanly
            document.getElementById('splash-screen').style.display = 'flex';
            document.getElementById('splash-screen').style.opacity = '1';
            setTimeout(() => { location.reload(); }, 300);
        }

        // --- 3. NAVIGATION LOGIC ---
        function switchView(view) {
            document.getElementById('eventForm').style.display = view === 'add' ? 'block' : 'none';
            document.getElementById('boardView').style.display = view === 'board' ? 'block' : 'none';
            document.getElementById('btn-add').classList.toggle('active', view === 'add');
            document.getElementById('btn-board').classList.toggle('active', view === 'board');
            if(view === 'board') loadBoard();
        }

        // --- 4. FORM LOGIC ---
        
        // Dynamic Fields for Catering vs Reservation
        const cateringFields = document.getElementById('catering-fields');
        document.querySelectorAll('input[name="eventType"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                if(e.target.value === 'Reservation') {
                    cateringFields.style.display = 'none';
                } else {
                    cateringFields.style.display = 'block';
                }
            });
        });

        // Weekend Warning Logic
        function checkWeekendWarning() {
            const dateVal = document.getElementById('eventDate').value;
            const timeVal = document.getElementById('startTime').value;
            const warningDiv = document.getElementById('weekendWarning');
            
            if(!dateVal || !timeVal) { warningDiv.style.display = 'none'; return; }

            // Parse Date safely
            const [y, m, d] = dateVal.split('-');
            const dateObj = new Date(y, m - 1, d);
            const dayOfWeek = dateObj.getDay(); // 0 = Sun, 5 = Fri, 6 = Sat

            // Parse Time
            const [hours, mins] = timeVal.split(':').map(Number);
            
            const isSundayLunch = dayOfWeek === 0 && ((hours >= 11 && hours < 14) || (hours === 14 && mins === 0));
        const isFriOrSat = (dayOfWeek === 5 || dayOfWeek === 6);

        if(isFriOrSat || isSundayLunch) {
                warningDiv.style.display = 'block';
            } else {
                warningDiv.style.display = 'none';
            }
        }

        const paymentBtn = document.getElementById('paymentBtn');
        const isPaidInput = document.getElementById('isPaid');

        paymentBtn.addEventListener('click', function() {
            if (isPaidInput.value === 'false') {
                isPaidInput.value = 'true';
                paymentBtn.textContent = 'Paid';
                paymentBtn.className = 'payment-toggle paid';
            } else {
                isPaidInput.value = 'false';
                paymentBtn.textContent = 'Unpaid';
                paymentBtn.className = 'payment-toggle unpaid';
            }
        });

        // Image Preview
        const ticketInput = document.getElementById('ticketImage');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const removeImageBtn = document.getElementById('removeImageBtn');

        ticketInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreviewContainer.style.display = 'block'; 
                }
                reader.readAsDataURL(file); 
            }
        });

        removeImageBtn.addEventListener('click', function() {
            ticketInput.value = ''; 
            imagePreview.src = '';
            imagePreviewContainer.style.display = 'none'; 
        });

        // Submit Form
        document.getElementById('eventForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const submitBtn = document.getElementById('submitEventBtn');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = "Uploading...";

            const eventType = document.querySelector('input[name="eventType"]:checked').value;
            const isCatering = eventType === 'Catering';

            try {
                let finalImageUrl = "";
                let isPaidStatus = false;

                // Only handle photos and payment if it's a Catering event
                if (isCatering) {
                    isPaidStatus = isPaidInput.value === 'true';
                    const file = ticketInput.files[0];
                    if (file) {
                        const uniqueFileName = `tickets/${currentLocation}/${Date.now()}_${file.name}`;
                        const storageRef = storage.ref().child(uniqueFileName);
                        await storageRef.put(file);
                        finalImageUrl = await storageRef.getDownloadURL();
                    }
                }

                submitBtn.textContent = "Saving to Database...";
                
                await db.ref(currentLocation + '/events').push({
                    type: eventType,
                    customer: document.getElementById('customerName').value,
                    phone: document.getElementById('customerPhone').value,
                    guests: document.getElementById('headcount').value,
                    date: document.getElementById('eventDate').value,
                    start: document.getElementById('startTime').value,
                    isPaid: isPaidStatus,
                    notes: document.getElementById('notes').value,
                    photo: finalImageUrl,
                    createdBy: activeUser,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                alert("Success! Event saved.");
                
                // Reset Form
                document.getElementById('eventForm').reset();
                paymentBtn.className = 'payment-toggle unpaid';
                paymentBtn.textContent = 'Unpaid';
                isPaidInput.value = 'false';
                ticketInput.value = '';
                imagePreview.src = '';
                imagePreviewContainer.style.display = 'none';
                document.getElementById('weekendWarning').style.display = 'none';
                
                // Jump to board to see the new event
                switchView('board');

            } catch (error) {
                console.error("Error:", error);
                alert("Error saving event.");
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        // --- 5. BOARD LOGIC & AUTO DELETE ---
        function loadBoard() {
            const list = document.getElementById('event-list');
            list.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Fetching from cloud...</p>';
            
            // Set up "Today" for Auto-Delete comparison
            const today = new Date();
            today.setHours(0,0,0,0);

            db.ref(currentLocation + '/events').on('value', snap => {
                let html = '';
                if(!snap.exists()) { list.innerHTML = '<p style="text-align:center; color:var(--text-muted);">No bookings found for this location.</p>'; return; }
                
                let eventsArray = [];
                snap.forEach(child => {
                    const ev = child.val();
                    
                    // Auto-Delete Logic: check if event date is strictly in the past
                    if (ev.date) {
                        const [y, m, d] = ev.date.split('-');
                        const evDate = new Date(y, m - 1, d);
                        if (evDate < today) {
                            // Event is over, delete it and skip adding it to the board
                            db.ref(currentLocation + '/events/' + child.key).remove();
                            return; 
                        }
                    }
                    
                    eventsArray.push({ id: child.key, ...ev });
                });

                // Sort by date (earliest first)
                eventsArray.sort((a, b) => new Date(a.date) - new Date(b.date));
                
                if(eventsArray.length === 0) {
                    list.innerHTML = '<p style="text-align:center; color:var(--text-muted);">No upcoming bookings found.</p>';
                    return;
                }

                eventsArray.forEach(ev => {
                    // Only show Payment Pill for Catering
                    let pillHtml = '';
                    if (ev.type === 'Catering') {
                        const paidClass = ev.isPaid ? 'paid' : 'unpaid';
                        const paidText = ev.isPaid ? '✅ PAID' : '❌ UNPAID';
                        pillHtml = `<button onclick="togglePaid('${ev.id}', ${ev.isPaid})" class="status-pill ${paidClass}">${paidText}</button>`;
                    }
                    
                    html += `
                        <div class="event-item">
                            <button onclick="deleteEvent('${ev.id}')" class="del-btn">🗑️</button>
                            ${pillHtml}
                            
                            <div style="font-size:12px; color:var(--primary); font-weight:800; margin: 8px 0 2px 0;">${ev.type.toUpperCase()}</div>
                            <b class="board-cust-name" style="font-size:18px;">${ev.customer}</b>
                            
                            <div style="font-size:14px; color:var(--text-muted); margin-top:5px; line-height: 1.5;">
                                📅 ${ev.date} | ⏰ ${ev.start}<br>
                                👥 ${ev.guests} Guests | 👤 ${ev.createdBy}
                            </div>
                            
                            ${ev.notes ? `<div style="background:var(--toggle-bg); padding:10px; border-radius:8px; margin-top:10px; font-size:13px; color:var(--text-main);"><b>Notes:</b> ${ev.notes}</div>` : ''}

                            <div style="display:flex; gap:10px; margin-top:10px;">
                                <a href="tel:${ev.phone}" class="action-link">📞 CALL</a>
                                ${ev.photo && ev.type === 'Catering' ? `<a href="${ev.photo}" target="_blank" class="action-link">📄 TICKET</a>` : ''}
                            </div>
                        </div>`;
                });
                list.innerHTML = html;
                
                // Re-apply any existing search filter after reloading data
                filterEvents(document.getElementById('eventSearch').value);
            });
        }

        // Search Filter Logic
        function filterEvents(query) {
            const q = query.toLowerCase();
            const items = document.querySelectorAll('.event-item');
            items.forEach(item => {
                const name = item.querySelector('.board-cust-name').innerText.toLowerCase();
                item.style.display = name.includes(q) ? 'block' : 'none';
            });
        }

        window.togglePaid = (id, current) => { db.ref(currentLocation + '/events/' + id).update({ isPaid: !current }); };
        window.deleteEvent = (id) => { if(confirm("Permanently delete this event?")) db.ref(currentLocation+'/events/'+id).remove(); };
    </script>
</body>
