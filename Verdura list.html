<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Pericos Verdura</title>
    
    <link rel="apple-touch-icon" href="image_0.png">
    <link rel="icon" type="image/png" href="image_0.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --container-bg: #fff;
            --border-color: #eee;
            --input-border: #ccc;
            --input-bg: #fff;
            --input-text: #333;
            --th-bg: #f8f9fa;
            --primary-color: #008c4a; /* Changed to a fresh produce green */
            --primary-hover: #006b38;
            --success-color: #28a745;
            --success-hover: #218838;
            --danger-color: #dc3545;
            --danger-hover: #c82333;
            --best-deal-bg: #d4edda;
            --best-deal-text: #155724;
            --supplier-group-bg: #f8f9fa;
            --result-text: #666;
            --header-color: #2c3e50;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --container-bg: #1e1e1e;
            --border-color: #333;
            --input-border: #555;
            --input-bg: #2c2c2c;
            --input-text: #fff;
            --th-bg: #2a2a2a;
            --primary-color: #32cd32;
            --primary-hover: #98fb98;
            --best-deal-bg: #173a20;
            --best-deal-text: #81c784;
            --supplier-group-bg: #2c2c2c;
            --result-text: #aaa;
            --header-color: #fff;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }
        
        .header-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-bottom: 20px; 
            position: relative;
        }
        .pericos-branding { display: flex; align-items: center; gap: 15px; }
        .header-logo { height: 80px; border-radius: 50%; border: 2px solid var(--border-color); }
        .main-title { margin: 0; color: var(--header-color); font-size: 32px; font-weight: bold; text-transform: uppercase; }

        button { font-family: inherit; }
        .dark-mode-btn { position: absolute; right: 0; background-color: transparent; color: var(--text-color); border: 2px solid var(--border-color); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .dark-mode-btn:hover { border-color: var(--primary-color); }
        
        .tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 20px; overflow-x: auto; white-space: nowrap; }
        .tab-btn { background: none; border: none; padding: 12px 24px; cursor: pointer; font-size: 16px; font-weight: bold; color: var(--result-text); transition: color 0.2s; }
        .tab-btn.active { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); margin-bottom: -2px; }
        
        .tab-content { display: none; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 15px; }
        .tab-content.active { display: block; }

        table { width: 100%; min-width: 950px; border-collapse: collapse; background: var(--container-bg); box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 15px; table-layout: fixed; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); vertical-align: top; }
        th { background-color: var(--th-bg); font-weight: 600; color: var(--text-color); }
        
        th:first-child, td:first-child { width: 20%; border-right: 2px solid var(--border-color); }
        .supplier-cell { width: 25%; border-right: 1px solid var(--border-color); transition: background-color 0.3s ease; }
        .supplier-cell:nth-child(4) { border-right: 2px solid var(--border-color); }
        
        /* Del Comal Tab needs a wider supplier cell since there's only 1 */
        #delComalTable { min-width: 500px; }
        #delComalTable .supplier-cell { width: auto; border-right: 2px solid var(--border-color); }
        
        th.action-col, td.action-col { width: 6%; text-align: center; vertical-align: middle; }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 16px; opacity: 0.5; padding: 2px; transition: 0.2s; }
        .icon-btn:hover { opacity: 1; transform: scale(1.2); }
        .delete-btn { background: none; border: none; color: var(--danger-color); cursor: pointer; font-size: 16px; opacity: 0.5; padding: 4px; margin: 4px 0; transition: 0.2s; }
        .delete-btn:hover { opacity: 1; transform: scale(1.2); }

        input[type="text"], input[type="number"], select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid var(--input-border); background-color: var(--input-bg); color: var(--input-text); border-radius: 4px; font-size: 14px; margin-bottom: 6px; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        input:focus, select:focus { outline: none; border-color: var(--primary-color); }
        
        .input-group { display: flex; gap: 6px; }
        .input-group input { width: 50%; }

        .qty-label { font-size: 12px; color: var(--result-text); font-weight: bold; white-space: nowrap; width: 70px; display: inline-block; }
        .order-qty-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }

        .s-result { font-weight: bold; font-size: 15px; text-align: right; color: var(--result-text); margin-top: 4px; }
        .best-deal { background-color: var(--best-deal-bg) !important; border-radius: 4px; }
        .best-deal .s-result { color: var(--best-deal-text); font-size: 16px; }
        .best-deal input, .best-deal select { background-color: rgba(255,255,255,0.1); }

        .tie-split-ui { display: none; margin-top: 4px; text-align: right; }
        .tie-split-ui span { font-size: 11px; color: #d35400; font-weight: bold; margin-right: 4px; }
        .tie-split-ui input { width: 50px !important; padding: 2px !important; font-size: 12px !important; margin-bottom: 0 !important; display: inline-block !important; border: 1.5px solid #e67e22 !important; border-radius: 3px !important; font-weight: bold; text-align: center; }

        .add-row-btn { background-color: var(--primary-color); color: white; border: none; padding: 10px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        
        .action-btns { float: right; display: flex; gap: 15px; flex-wrap: wrap; justify-content: flex-end; align-items: center; }
        .btn-green { background-color: var(--success-color); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-red { background-color: var(--danger-color); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-blue { background-color: var(--primary-color); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }

        .shopping-list-panel { margin-top: 40px; background: var(--container-bg); padding: 20px; border-radius: 8px; border-top: 4px solid var(--success-color); }
        
        .hide-prices-active .price-badge { display: none !important; }
        
        .supplier-grid { display: block; width: 100%; margin-top: 15px; }
        .supplier-group { display: inline-block; width: 32%; box-sizing: border-box; padding: 15px; background: var(--supplier-group-bg); border-left: 3px solid var(--primary-color); border-radius: 4px; vertical-align: top; margin-right: 1%; margin-bottom: 15px; }
        .supplier-group:last-child { margin-right: 0; }
        .supplier-group h4 { margin: 0 0 10px 0; color: var(--text-color); font-size: 18px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .supplier-group ul { margin: 0; padding-left: 20px; }
        .supplier-group li { padding: 6px 0; font-size: 14px; line-height: 1.4; border-bottom: 1px dashed var(--border-color); }
        .supplier-group li:last-child { border-bottom: none; }
        .price-badge { font-weight: bold; color: var(--success-color); display: block; margin-top: 2px; }
        .qty-badge { color: var(--primary-color); font-weight: bold; margin-right: 5px; }
        .tie-badge { color: #d35400; font-size: 11px; font-weight: bold; margin-left: 4px; }

        @media (max-width: 768px) {
            .header-container { flex-direction: column; text-align: center; }
            .dark-mode-btn { position: relative; margin-top: 15px; }
            .action-btns { justify-content: center; width: 100%; margin-bottom: 15px; }
            .action-btns button { width: 100%; margin-bottom: 5px; }
            .supplier-group { width: 100% !important; display: block; margin-right: 0; }
        }

        @media print {
            body { background-color: #fff; margin: 0; padding: 0; color: #000; }
            .header-container, .tabs, .tab-content, .action-btns, .add-row-btn, .action-col { display: none !important; }
            .shopping-list-panel { box-shadow: none; border-top: none; margin-top: 0; padding: 0; background: #fff; }
            .supplier-grid { display: block !important; width: 100% !important; }
            .supplier-group { display: inline-block !important; width: 32% !important; border-left: 3px solid #000; background: none; break-inside: avoid; }
            .supplier-group h4, .supplier-group li { color: #000; border-color: #ddd; }
        }
    </style>
</head>
<body>

    <div class="header-container" id="brand-header">
        <div class="pericos-branding">
            <img src="image_0.png" alt="Los Pericos Logo" class="header-logo">
            <h1 class="main-title">LOS PERICOS VERDURA</h1>
        </div>
        <button class="dark-mode-btn" onclick="toggleDarkMode()" id="darkModeBtn">🌙 Dark Mode</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'Weight')">Weight & Volume</button>
        <button class="tab-btn" onclick="openTab(event, 'Unit')">Unit Count</button>
        <button class="tab-btn" onclick="openTab(event, 'DelComal')">Del Comal</button>
    </div>

    <div id="Weight" class="tab-content active">
        <table id="weightTable" data-has-units="true">
            <thead><tr><th>Item & Order Qty</th><th>Supplier Option 1</th><th>Supplier Option 2</th><th>Supplier Option 3</th><th class="action-col"></th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="add-row-btn" onclick="addRow('weightTable', 'Total $', 'Total oz')">+ Add Produce to Bottom</button>
    </div>

    <div id="Unit" class="tab-content">
        <table id="unitTable" data-has-units="false" data-unit-label="/ item">
            <thead><tr><th>Item & Order Qty</th><th>Supplier Option 1</th><th>Supplier Option 2</th><th>Supplier Option 3</th><th class="action-col"></th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="add-row-btn" onclick="addRow('unitTable', 'Bulk $', 'Count')">+ Add Produce to Bottom</button>
    </div>

    <div id="DelComal" class="tab-content">
        <table id="delComalTable" data-has-units="false" data-unit-label="/ item">
            <thead><tr><th>Item & Order Qty</th><th>Del Comal Vendor Info</th><th class="action-col"></th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="add-row-btn" onclick="addRow('delComalTable', 'Bulk $', 'Count')">+ Add Item to Bottom</button>
    </div>

    <div class="shopping-list-panel" id="final-list-panel">
        <div class="action-btns">
            <label style="cursor:pointer; font-weight:bold; font-size:14px; color:var(--text-color); display:flex; align-items:center; gap:5px;">
                <input type="checkbox" id="hidePricesToggle" onchange="toggleHidePrices()"> Hide Prices on Print/PDF
            </label>
            <button class="btn-red" onclick="clearAllData()">🗑️ Clear Data</button>
            <button class="btn-blue" onclick="downloadPDF()">📄 Download PDF</button>
            <button class="btn-green" onclick="window.print()">🖨️ Print</button>
        </div>
        <h2>🛒 Automated Shopping List</h2>
        <div id="shopping-list-content" class="supplier-grid"></div>
    </div>

    <script>
        const defaultSuppliers = ["Mr. Pepper", "Cantu", "Produce 3"];

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('darkModeBtn').innerText = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
            localStorage.setItem('restaurantCalcDarkMode_Verdura', isDark);
        }

        function toggleHidePrices() {
            const panel = document.getElementById('final-list-panel');
            if(document.getElementById('hidePricesToggle').checked) {
                panel.classList.add('hide-prices-active');
            } else {
                panel.classList.remove('hide-prices-active');
            }
        }

        function openTab(evt, tabName) {
            document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
            document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function createSupplierCellHTML(supplierName, priceVal, qtyVal, unitVal, hasUnits, splitVal) {
            let qtyHtml = '';
            if (hasUnits) {
                qtyHtml = `
                <div style="display:flex; width:50%; gap:2px;">
                    <input type="number" class="s-qty" placeholder="Qty" value="${qtyVal}" style="width:60%; margin-bottom:0;" oninput="processRowUpdate(this)">
                    <select class="s-unit" style="width:40%; padding:4px; font-size:12px; margin-bottom:0;" onchange="processRowUpdate(this)">
                        <option value="oz" ${unitVal==='oz'?'selected':''}>oz</option>
                        <option value="lb" ${unitVal==='lb'?'selected':''}>lb</option>
                        <option value="fl oz" ${unitVal==='fl oz'?'selected':''}>fl oz</option>
                        <option value="ml" ${unitVal==='ml'?'selected':''}>ml</option>
                    </select>
                </div>`;
            } else {
                qtyHtml = `<input type="number" class="s-qty" placeholder="Pack Size" value="${qtyVal}" oninput="processRowUpdate(this)">`;
            }

            return `
                <td class="supplier-cell">
                    <input type="text" class="s-name" placeholder="Supplier Name" value="${supplierName}" oninput="processRowUpdate(this)">
                    <div class="input-group">
                        <input type="number" class="s-price" placeholder="Price $" value="${priceVal}" oninput="processRowUpdate(this)">
                        ${qtyHtml}
                    </div>
                    <div class="s-result" data-value="0">$0.00</div>
                    <div class="tie-split-ui">
                        <span>Tie Qty:</span>
                        <input type="number" class="split-qty" min="0" step="0.5" value="${splitVal || 0}" oninput="handleManualSplitChange(this)">
                    </div>
                </td>
            `;
        }

        function addRow(tableId, pricePlace, qtyPlace, itemName = "", orderQty = "", targetUnit = "oz", s1 = [defaultSuppliers[0], "", "", "lb", 0], s2 = [defaultSuppliers[1], "", "", "lb", 0], s3 = [defaultSuppliers[2], "", "", "lb", 0]) {
            let tbody = document.querySelector(`#${tableId} tbody`);
            let tr = document.createElement('tr');
            let hasUnits = tableId === 'weightTable';
            let isDelComal = tableId === 'delComalTable';
            
            let targetUnitHtml = '';
            if (hasUnits) {
                targetUnitHtml = `
                <div class="order-qty-row">
                    <span class="qty-label">Compare Per:</span>
                    <select class="target-unit" onchange="processRowUpdate(this)" style="padding:4px; font-size:12px; margin-bottom:0;">
                        <option value="oz" ${targetUnit==='oz'?'selected':''}>oz</option>
                        <option value="lb" ${targetUnit==='lb'?'selected':''}>lb</option>
                        <option value="fl oz" ${targetUnit==='fl oz'?'selected':''}>fl oz</option>
                        <option value="ml" ${targetUnit==='ml'?'selected':''}>ml</option>
                    </select>
                </div>`;
            }

            let html = `<td>
                <input type="text" class="item-name" placeholder="Item Name" value="${itemName}" oninput="processRowUpdate(this)">
                <div class="order-qty-row">
                    <span class="qty-label">Order Qty:</span>
                    <input type="number" class="order-qty" value="${orderQty}" min="0" oninput="processRowUpdate(this)" style="margin-bottom:0;">
                </div>
                ${targetUnitHtml}
            </td>`;
            
            if (isDelComal) {
                s1[0] = "Del Comal"; // Lock name for this tab
            }

            html += createSupplierCellHTML(s1[0], s1[1], s1[2], s1[3] || (hasUnits ? 'lb' : 'oz'), hasUnits, s1[4] || 0);
            
            // Only generate competitors if it's NOT the Del Comal tab
            if (!isDelComal) {
                html += createSupplierCellHTML(s2[0], s2[1], s2[2], s2[3] || (hasUnits ? 'lb' : 'oz'), hasUnits, s2[4] || 0);
                html += createSupplierCellHTML(s3[0], s3[1], s3[2], s3[3] || (hasUnits ? 'lb' : 'oz'), hasUnits, s3[4] || 0);
            }
            
            html += `<td class="action-col">
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <button class="icon-btn" onclick="insertRowRelative(this, 'before')" title="Add Row Above">⬆️</button>
                    <button class="delete-btn" onclick="deleteRow(this)" title="Delete Item">❌</button>
                    <button class="icon-btn" onclick="insertRowRelative(this, 'after')" title="Add Row Below">⬇️</button>
                </div>
            </td>`;
            
            tr.innerHTML = html;
            tbody.appendChild(tr);
            processRowUpdate(tr.querySelector('.item-name')); 
        }

        function insertRowRelative(btn, direction) {
            let currentRow = btn.closest('tr');
            let table = currentRow.closest('table');
            let tableId = table.id;
            let isWeight = tableId === 'weightTable';
            let tUnit = isWeight ? 'lb' : 'oz';
            
            addRow(tableId, 'Price $', 'Qty', '', '', tUnit); 
            
            let tbody = table.querySelector('tbody');
            let newRow = tbody.lastElementChild; 
            
            if (direction === 'before') {
                tbody.insertBefore(newRow, currentRow);
            } else if (direction === 'after') {
                tbody.insertBefore(newRow, currentRow.nextSibling);
            }
            
            newRow.querySelector('.item-name').focus();
            saveToLocalStorage(); 
        }

        function processRowUpdate(inputElem) {
            let row = inputElem.closest('tr');
            let table = row.closest('table');
            let hasUnits = table.getAttribute('data-has-units') === 'true';
            let baseUnitLabel = table.getAttribute('data-unit-label') || "";
            
            let cells = row.querySelectorAll('.supplier-cell');
            let minPrice = Infinity;

            const conversionFactors = { "oz": 1, "lb": 16, "fl oz": 1, "ml": 0.033814 };

            let targetUnitSelect = row.querySelector('.target-unit');
            let targetUnit = targetUnitSelect ? targetUnitSelect.value : null;
            let displayUnitLabel = targetUnit ? `/ ${targetUnit}` : baseUnitLabel;

            cells.forEach(cell => {
                let price = parseFloat(cell.querySelector('.s-price').value) || 0;
                let qtyInput = cell.querySelector('.s-qty').value;
                let qty = parseFloat(qtyInput);
                if (isNaN(qty)) qty = 1; 

                let finalPrice = 0;

                if (price > 0) {
                    if (hasUnits && targetUnit) {
                        if (qty === 0) qty = 1;
                        let sUnitSelect = cell.querySelector('.s-unit');
                        let sUnit = sUnitSelect ? sUnitSelect.value : targetUnit;
                        let qtyInBase = qty * conversionFactors[sUnit];
                        let finalQtyInTargetUnit = qtyInBase / conversionFactors[targetUnit];
                        finalPrice = price / finalQtyInTargetUnit;
                    } else {
                        if (qty === 0) qty = 1;
                        finalPrice = price / qty;
                    }
                }

                let resultDiv = cell.querySelector('.s-result');
                if (finalPrice > 0) {
                    resultDiv.innerText = "$" + finalPrice.toFixed(3) + " " + displayUnitLabel;
                    resultDiv.setAttribute('data-value', finalPrice);
                    if (finalPrice < minPrice) minPrice = finalPrice;
                } else {
                    resultDiv.innerText = "$0.00 " + displayUnitLabel;
                    resultDiv.setAttribute('data-value', 0);
                }
                cell.classList.remove('best-deal');
            });

            if (minPrice !== Infinity) {
                cells.forEach(cell => {
                    let val = parseFloat(cell.querySelector('.s-result').getAttribute('data-value'));
                    if (val === minPrice && val > 0) cell.classList.add('best-deal');
                });
            }

            let winningCells = row.querySelectorAll('.best-deal');
            let orderQty = parseFloat(row.querySelector('.order-qty').value) || 0;

            if (winningCells.length > 1) {
                let currentSplitSum = 0;
                winningCells.forEach(cell => {
                    currentSplitSum += parseFloat(cell.querySelector('.split-qty').value) || 0;
                    cell.querySelector('.tie-split-ui').style.display = 'block';
                });

                if (Math.abs(currentSplitSum - orderQty) > 0.02) {
                    let equalSplit = orderQty / winningCells.length;
                    let displaySplit = equalSplit % 1 === 0 ? equalSplit : equalSplit.toFixed(2);
                    winningCells.forEach(cell => {
                        cell.querySelector('.split-qty').value = displaySplit;
                    });
                }
                
                cells.forEach(cell => {
                    if (!cell.classList.contains('best-deal')) cell.querySelector('.tie-split-ui').style.display = 'none';
                });

            } else {
                cells.forEach(cell => {
                    cell.querySelector('.tie-split-ui').style.display = 'none';
                    if (cell.classList.contains('best-deal')) {
                        cell.querySelector('.split-qty').value = orderQty;
                    } else {
                        cell.querySelector('.split-qty').value = 0;
                    }
                });
            }

            generateShoppingList();
            saveToLocalStorage();
        }

        function handleManualSplitChange(splitInput) {
            let row = splitInput.closest('tr');
            let winningCells = row.querySelectorAll('.best-deal');
            let newTotalOrderQty = 0;

            winningCells.forEach(cell => {
                newTotalOrderQty += parseFloat(cell.querySelector('.split-qty').value) || 0;
            });
            
            row.querySelector('.order-qty').value = newTotalOrderQty;

            generateShoppingList();
            saveToLocalStorage();
        }

        function deleteRow(btn) {
            let row = btn.closest('tr');
            row.remove();
            generateShoppingList();
            saveToLocalStorage();
        }

        function generateShoppingList() {
            let allRows = document.querySelectorAll('tbody tr');
            let listBySupplier = {};

            allRows.forEach(row => {
                let itemName = row.querySelector('.item-name').value.trim();
                let winningCells = row.querySelectorAll('.best-deal');

                if (itemName && winningCells.length > 0) {
                    let tieCount = winningCells.length;
                    
                    winningCells.forEach(winningCell => {
                        let supplierName = winningCell.querySelector('.s-name').value.trim() || "Unknown Supplier";
                        let unitPriceVal = parseFloat(winningCell.querySelector('.s-price').value) || 0;
                        let priceStr = winningCell.querySelector('.s-result').innerText;
                        let assignedQty = parseFloat(winningCell.querySelector('.split-qty').value) || 0;
                        
                        if (assignedQty > 0) {
                            let lineTotal = (unitPriceVal * assignedQty).toFixed(2);
                            let tieBadgeHtml = tieCount > 1 ? `<span class="tie-badge">(Tie Split)</span>` : '';

                            if (!listBySupplier[supplierName]) listBySupplier[supplierName] = [];
                            
                            listBySupplier[supplierName].push(`
                                <span><span class="qty-badge">${assignedQty}</span> ${itemName} ${tieBadgeHtml}</span> 
                                <span class="price-badge">${priceStr} <span style="color:var(--result-text); font-weight:normal;">(Total: $${lineTotal})</span></span>
                            `);
                        }
                    });
                }
            });

            const container = document.getElementById('shopping-list-content');
            container.innerHTML = '';
            const suppliers = Object.keys(listBySupplier);

            if(suppliers.length === 0) {
                container.innerHTML = `<p style="color:#999; font-style:italic;">Add prices and order quantities above to generate your list.</p>`;
                return;
            }

            suppliers.forEach(supp => {
                let html = `<div class="supplier-group"><h4>📦 ${supp}</h4><ul>`;
                listBySupplier[supp].forEach(itemHtml => { html += `<li>${itemHtml}</li>`; });
                html += `</ul></div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function downloadPDF() {
            const printElement = document.createElement('div');
            printElement.style.padding = "40px";
            printElement.style.backgroundColor = "#ffffff";
            printElement.style.color = "#000000";
            printElement.style.fontFamily = "system-ui, -apple-system, sans-serif";
            printElement.style.width = "1000px"; 

            const headerHtml = document.getElementById('brand-header').outerHTML;
            const listHtml = document.getElementById('final-list-panel').outerHTML;
            printElement.innerHTML = headerHtml + listHtml;

            if(document.getElementById('hidePricesToggle').checked) {
                printElement.querySelector('#final-list-panel').classList.add('hide-prices-active');
            }

            printElement.querySelector('.dark-mode-btn').remove();
            printElement.querySelector('.action-btns').remove();

            let gridContainer = printElement.querySelector('.supplier-grid');
            if(gridContainer) {
                gridContainer.style.display = 'flex';
                gridContainer.style.flexDirection = 'row';
                gridContainer.style.flexWrap = 'nowrap';
            }

            const opt = {
                margin: 0.5,
                filename: 'Los_Pericos_Verdura_Order.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' } 
            };
            html2pdf().set(opt).from(printElement).save();
        }

        function saveToLocalStorage() {
            let data = { weight: [], unit: [], delComal: [] };
            function extractTableData(tableId, targetArray) {
                document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
                    let itemName = row.querySelector('.item-name').value;
                    let orderQty = row.querySelector('.order-qty').value;
                    let targetUnitElem = row.querySelector('.target-unit');
                    
                    let cells = row.querySelectorAll('.supplier-cell');
                    let rowData = { item: itemName, qty: orderQty, targetUnit: targetUnitElem ? targetUnitElem.value : null, suppliers: [] };
                    
                    cells.forEach(cell => {
                        let sUnitElem = cell.querySelector('.s-unit');
                        let splitQtyElem = cell.querySelector('.split-qty');
                        rowData.suppliers.push([
                            cell.querySelector('.s-name').value,
                            cell.querySelector('.s-price').value,
                            cell.querySelector('.s-qty').value,
                            sUnitElem ? sUnitElem.value : 'oz',
                            splitQtyElem ? splitQtyElem.value : 0
                        ]);
                    });
                    targetArray.push(rowData);
                });
            }
            extractTableData('weightTable', data.weight);
            extractTableData('unitTable', data.unit);
            extractTableData('delComalTable', data.delComal);
            
            // NOTE: Using a new save key so it doesn't delete Sysco list!
            localStorage.setItem('restaurantPriceCalc_Verdura', JSON.stringify(data));
        }

        function loadFromLocalStorage() {
            if (localStorage.getItem('restaurantCalcDarkMode_Verdura') === 'true') toggleDarkMode();

            let savedData = localStorage.getItem('restaurantPriceCalc_Verdura');
            
            if (!savedData) {
                const weightItems = ["HABANERO", "SERRANO", "CHILE DE ARBOL", "BROCCOLI", "ZUCCHINI", "SQUASH", "GUAJILLO", "OREGANO", "PIMIENTA", "AJO MOLIDO", "PAPRIKA"];
                const unitItems = ["AJO PELADO", "TOMATE", "AGUACATE", "RED BELL PEPPER", "GREEN BELL PEPPER", "POBLANO PEPPER", "JALAPENO PEPPER", "CILANTRO", "ZANAHORIA", "GREEN LEAF", "SPINACH", "LIMES", "LEMONS", "CELERY", "CEBOLLA", "NARANJA", "RED CABAGE", "HONGOS", "POTATO #2", "PAN X TORTA", "COCA", "BURRO 8”", "BURRO 10”", "BURRO12”", "HARINA", "MAIZ", "AMARILLITA", "POT WHITE", "ACEITE", "HUEVOS", "JALAPENEO LATA"];
                const delComalItems = ["CHIPS", "VERDE", "ROJA", "BLANCA"];

                const preloadedData = {
                    weight: weightItems.map(item => ({
                        item: item, qty: "", targetUnit: "lb",
                        suppliers: [["Mr. Pepper", "", "", "lb", 0], ["Cantu", "", "", "lb", 0], ["Produce 3", "", "", "lb", 0]]
                    })),
                    unit: unitItems.map(item => ({
                        item: item, qty: "", targetUnit: "oz",
                        suppliers: [["Mr. Pepper", "", "", "oz", 0], ["Cantu", "", "", "oz", 0], ["Produce 3", "", "", "oz", 0]]
                    })),
                    delComal: delComalItems.map(item => ({
                        item: item, qty: "", targetUnit: "oz",
                        suppliers: [["Del Comal", "", "", "oz", 0]]
                    }))
                };
                
                savedData = JSON.stringify(preloadedData);
                localStorage.setItem('restaurantPriceCalc_Verdura', savedData);
            }

            let data = JSON.parse(savedData);
            function rebuildTable(tableId, rowDataArray, pLabel, qLabel) {
                if(!rowDataArray || rowDataArray.length === 0) { addRow(tableId, pLabel, qLabel); return; }
                rowDataArray.forEach(rd => { 
                    let oQty = rd.qty !== undefined ? rd.qty : "";
                    let tUnit = rd.targetUnit !== undefined ? rd.targetUnit : "oz";
                    
                    let s1 = rd.suppliers[0] || ["", "", "", "lb", 0];
                    let s2 = rd.suppliers[1] || ["", "", "", "lb", 0];
                    let s3 = rd.suppliers[2] || ["", "", "", "lb", 0];
                    
                    if (s1.length < 5) s1.push(0);
                    if (s2.length < 5) s2.push(0);
                    if (s3.length < 5) s3.push(0);

                    addRow(tableId, pLabel, qLabel, rd.item, oQty, tUnit, s1, s2, s3); 
                });
            }
            if(data.weight) rebuildTable('weightTable', data.weight, 'Price $', 'Total oz');
            if(data.unit) rebuildTable('unitTable', data.unit, 'Bulk $', 'Count');
            if(data.delComal) rebuildTable('delComalTable', data.delComal, 'Bulk $', 'Count');
        }

        function clearAllData() {
            if(confirm("Are you sure you want to delete all your items and prices? This will also wipe your pre-loaded Verdura master list!")) {
                localStorage.removeItem('restaurantPriceCalc_Verdura');
                location.reload(); 
            }
        }

        window.onload = loadFromLocalStorage;
    </script>
