<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Los Pericos Master App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="image_0.png">
    <link rel="icon" type="image/png" href="image_0.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --container-bg: #fff;
            --border-color: #e0e0e0;
            --input-border: #ccc;
            --input-bg: #fff;
            --input-text: #333;
            --th-bg: #f8f9fa;
            --primary-color: #0056b3; 
            --primary-hover: #004494;
            --verdura-color: #008c4a;
            --analytics-color: #8e44ad;
            --receiving-color: #e67e22;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --best-deal-bg: #e8f5e9;
            --best-deal-text: #155724;
            --supplier-group-bg: #f8f9fa;
            --result-text: #666;
            --header-color: #2c3e50;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --container-bg: #1e1e1e;
            --border-color: #333;
            --input-border: #555;
            --input-bg: #2c2c2c;
            --input-text: #fff;
            --th-bg: #2a2a2a;
            --primary-color: #4da3ff;
            --verdura-color: #32cd32;
            --analytics-color: #b19cd9;
            --receiving-color: #f39c12;
            --best-deal-bg: #173a20;
            --best-deal-text: #81c784;
            --supplier-group-bg: #252525;
            --result-text: #aaa;
            --header-color: #fff;
        }

        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); max-width: 1200px; margin: 0 auto; padding: 0; padding-bottom: 120px; transition: background-color 0.3s, color 0.3s; }
        
        /* PIN LOGIN OVERLAY */
        #login-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); z-index: 9999999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .pin-box { background: var(--container-bg); padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--border-color); width: 80%; max-width: 320px; }
        .pin-input { width: 100%; font-size: 32px; text-align: center; letter-spacing: 15px; padding: 15px; border-radius: 12px; border: 2px solid var(--primary-color); background: var(--input-bg); color: var(--text-color); margin: 20px 0; box-sizing: border-box; }
        .pin-btn { background: var(--primary-color); color: white; border: none; padding: 15px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        #pin-error { color: var(--danger-color); font-weight: bold; margin-top: 15px; display: none; }

        /* SPLASH SCREEN */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.3s ease-out; }
        .splash-logo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--primary-color); animation: pulse-ring 2s infinite; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .splash-text { margin-top: 30px; font-size: 18px; font-weight: bold; color: var(--text-color); letter-spacing: 3px; text-transform: uppercase; animation: fade-pulse 2s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 86, 179, 0.4); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0, 86, 179, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 86, 179, 0); } }
        @keyframes fade-pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* HEADER & UI */
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; margin-top: 10px; padding: 0 20px; flex-wrap: wrap; gap: 15px; }
        .pericos-branding { display: flex; align-items: center; gap: 15px; }
        .header-logo { height: 80px; border-radius: 50%; border: 2px solid var(--border-color); }
        .main-title { margin: 0; color: var(--header-color); font-size: 32px; font-weight: bold; text-transform: uppercase; }
        .header-utils { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; align-items: center; }
        .util-btn { background-color: transparent; color: var(--text-color); border: 2px solid var(--border-color); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; }
        
        /* APP SECTIONS */
        .app-section { display: none; padding: 0 20px; }
        .app-section.active-app { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .search-bar { width: 100%; padding: 12px 16px; font-size: 16px; border: 2px solid var(--border-color); border-radius: 12px; margin-bottom: 12px; background-color: var(--input-bg); color: var(--input-text); box-sizing: border-box; transition: 0.3s; }
        .cloud-status { display: block; padding: 6px; background: #e3f2fd; color: #0d47a1; border-radius: 6px; font-size: 12px; font-weight: bold; margin: 0 20px 10px 20px; text-align: center; }
        .timestamp { font-size: 12px; color: var(--result-text); font-style: italic; margin-bottom: 15px; text-align: right; font-weight: bold; padding: 0 20px; }

        .tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 20px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;}
        .tab-btn { background: none; border: none; padding: 12px 24px; cursor: pointer; font-size: 16px; font-weight: bold; color: var(--result-text); }
        .sysco-wrapper .tab-btn.active { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); margin-bottom: -2px; }
        .verdura-wrapper .tab-btn.active { color: var(--verdura-color); border-bottom: 3px solid var(--verdura-color); margin-bottom: -2px; }
        .analytics-wrapper .tab-btn.active { color: var(--analytics-color); border-bottom: 3px solid var(--analytics-color); margin-bottom: -2px; }
        .receiving-wrapper .tab-btn.active { color: var(--receiving-color); border-bottom: 3px solid var(--receiving-color); margin-bottom: -2px; }
        
        .tab-content { display: none; padding-bottom: 15px; }
        .tab-content.active { display: block; }

        /* CARDS */
        .table-container { display: flex; flex-direction: column; gap: 15px; }
        .item-card { background: var(--container-bg); border-radius: 16px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.06); border: 2px solid transparent; transition: 0.3s; position: relative; overflow: hidden; }
        .item-card.has-order { border-color: var(--success-color); }
        
        .inventory-controls { display: flex; gap: 5px; background: var(--supplier-group-bg); padding: 6px 10px; border-radius: 12px; border: 2px solid var(--border-color); align-items: center; }
        .inv-input { width: 50px !important; text-align: center; border: 1px solid var(--border-color) !important; font-size: 16px !important; font-weight: bold; border-radius: 6px !important; background: var(--input-bg); color: var(--text-color); margin:0 !important; }

        .card-body { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
        .supplier-cell { border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; background: var(--supplier-group-bg); position: relative; }
        .supplier-cell.best-deal { border-color: var(--success-color); background: var(--best-deal-bg); }
        
        .fab-btn { position: fixed; bottom: 95px; right: 20px; width: 65px; height: 65px; border-radius: 50%; background: var(--primary-color); color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 32px; z-index: 999; cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 12px 10px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 1000; }
        body.dark-mode .bottom-nav { background: rgba(30, 30, 30, 0.9); }
        .nav-btn { flex: 1; border: none; background: transparent; color: var(--result-text); font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .nav-icon { font-size: 20px; }
        .active-sysco { color: var(--primary-color); } .active-verdura { color: var(--verdura-color); } .active-analytics { color: var(--analytics-color); } .active-receiving { color: var(--receiving-color); }

        .cart-badge { position: absolute; top: -5px; right: 0px; background: var(--danger-color); color: white; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }

        #sync-toast { visibility: hidden; min-width: 250px; background-color: var(--success-color); color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: fixed; z-index: 9999; bottom: 100px; left: 50%; transform: translateX(-50%); font-weight: bold; opacity: 0; transition: 0.5s; }
        #sync-toast.show { visibility: visible; opacity: 1; }

        input { box-sizing: border-box; }
    </style>
</head>
<body>

    <div style="text-align:center; padding:15px; background:white; border-bottom:1px solid #ddd;">
        <a href="events.html" style="text-decoration:none; font-weight:bold; color:#0056b3;">📅 GO TO EVENTS & CATERING</a>
    </div>

    <script>
        if (localStorage.getItem('restaurantCalcDarkMode') === 'true') { document.body.classList.add('dark-mode'); }
    </script>

    <div id="login-screen">
        <div class="pin-box">
            <img src="image_0.png" alt="Logo" style="width:100px; border-radius:50%; margin-bottom:10px;">
            <h2 style="margin:0;">Staff Login</h2>
            <input type="password" id="pin-input" class="pin-input" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="pin-btn" onclick="verifyPin()">Unlock App</button>
            <p id="pin-error" style="color:red; display:none; margin-top:10px;">❌ Invalid PIN</p>
        </div>
    </div>

    <div id="splash-screen" style="display:none;">
        <img src="image_0.png" alt="Logo" class="splash-logo">
        <div class="splash-text">Syncing Vault...</div>
    </div>

    <div class="header-container">
        <div class="pericos-branding">
            <img src="image_0.png" alt="Logo" class="header-logo">
            <h1 class="main-title">LOS PERICOS MASTER</h1>
        </div>
        <div class="header-utils">
            <select id="location-switcher" onchange="switchLocation(this.value)" style="padding:8px; border-radius:8px; border:1px solid var(--border-color); font-weight:bold;">
                <option value="LP_Willis">📍 LP Willis</option>
                <option value="LP_Huntsville">📍 LP Huntsville</option>
            </select>
            <div id="user-badge" class="user-badge" style="display:none; background:var(--best-deal-bg); padding:6px 12px; border-radius:20px; font-weight:bold; font-size:13px;">👤 User</div>
            <button class="util-btn" onclick="toggleDarkMode()" id="darkModeBtn">🌙 Dark Mode</button>
            <button class="util-btn" style="color:var(--danger-color);" onclick="logoutUser()">🚪 Out</button>
        </div>
    </div>

    <div id="sync-toast">☁️ List synced!</div>
    <div class="cloud-status" id="conn-sysco">☁️ Connected to Cloud</div>

    <div id="sysco-wrapper" class="app-section sysco-wrapper active-app">
        <input type="text" class="search-bar" placeholder="🔍 Search Sysco..." onkeyup="filterTable('sysco', this.value)">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'sysco', 'Weight_sysco')">Weight/Vol</button>
            <button class="tab-btn" onclick="openTab(event, 'sysco', 'Unit_sysco')">Units</button>
            <button class="tab-btn" onclick="openTab(event, 'sysco', 'MFE_sysco')">MFE</button>
        </div>
        <div id="Weight_sysco" class="tab-content active"><div id="weightTable_sysco" class="table-container" data-has-units="true"></div></div>
        <div id="Unit_sysco" class="tab-content"><div id="unitTable_sysco" class="table-container" data-has-units="false"></div></div>
        <div id="MFE_sysco" class="tab-content"><div id="mfeTable_sysco" class="table-container single-vendor-table" data-has-units="false"></div></div>
        <div class="shopping-list-panel" style="margin-top:30px; padding:20px; background:var(--container-bg); border-radius:12px;">
            <button class="btn-yellow" style="width:100%; padding:15px; background:var(--warning-color); border:none; border-radius:8px; font-weight:bold; margin-bottom:10px;" onclick="resetQuantities('sysco')">🔄 Send to Receiving & Reset</button>
            <div id="list-content-sysco"></div>
        </div>
    </div>

    <div id="verdura-wrapper" class="app-section verdura-wrapper">
        <input type="text" class="search-bar" placeholder="🔍 Search Produce..." onkeyup="filterTable('verdura', this.value)">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'verdura', 'Weight_verdura')">Weight/Vol</button>
            <button class="tab-btn" onclick="openTab(event, 'verdura', 'Unit_verdura')">Units</button>
        </div>
        <div id="Weight_verdura" class="tab-content active"><div id="weightTable_verdura" class="table-container" data-has-units="true"></div></div>
        <div id="Unit_verdura" class="tab-content"><div id="unitTable_verdura" class="table-container" data-has-units="false"></div></div>
        <div class="shopping-list-panel" style="margin-top:30px; padding:20px; background:var(--container-bg); border-radius:12px;">
            <button class="btn-yellow" style="width:100%; padding:15px; background:var(--warning-color); border:none; border-radius:8px; font-weight:bold; margin-bottom:10px;" onclick="resetQuantities('verdura')">🔄 Send to Receiving & Reset</button>
            <div id="list-content-verdura"></div>
        </div>
    </div>

    <div id="receiving-wrapper" class="app-section receiving-wrapper">
        <h2 style="text-align:center;">🚚 Truck Day</h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'receiving', 'Rec_Sysco')">📦 Sysco</button>
            <button class="tab-btn" onclick="openTab(event, 'receiving', 'Rec_Verdura')">🥦 Produce</button>
        </div>
        <div id="Rec_Sysco" class="tab-content active"><div id="receiving-list-sysco" class="table-container"></div></div>
        <div id="Rec_Verdura" class="tab-content"><div id="receiving-list-verdura" class="table-container"></div></div>
    </div>

    <div id="analytics-wrapper" class="app-section analytics-wrapper">
        <h2 style="text-align:center;">📊 Analytics</h2>
        <div class="analytics-box" style="background:var(--success-color); color:white; padding:20px; border-radius:12px; text-align:center; margin-bottom:20px;">
            <div style="font-size:14px; opacity:0.9;">Walk-In Net Worth</div>
            <div id="net-worth-display" style="font-size:36px; font-weight:bold;">$0.00</div>
        </div>
        <div id="activity-feed-list" style="background:var(--container-bg); padding:15px; border-radius:12px; border:1px solid var(--border-color);"></div>
    </div>

    <div class="bottom-nav">
        <button id="nav-sysco" class="nav-btn active-sysco" onclick="switchApp('sysco')"><span class="nav-icon">📦</span>Sysco</button>
        <button id="nav-verdura" class="nav-btn" onclick="switchApp('verdura')"><span class="nav-icon">🥦</span>Produce</button>
        <button id="nav-receiving" class="nav-btn" onclick="switchApp('receiving')"><span class="nav-icon">🚚</span>Truck</button>
        <button id="nav-analytics" class="nav-btn" onclick="switchApp('analytics')"><span class="nav-icon">📊</span>Stats</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOO73pfw9yyyukquyOJfjs2nPNQn__XLM",
            authDomain: "los-pericos-46378.firebaseapp.com",
            databaseURL: "https://los-pericos-46378-default-rtdb.firebaseio.com",
            projectId: "los-pericos-46378",
            storageBucket: "los-pericos-46378.firebasestorage.app",
            messagingSenderId: "463221124647",
            appId: "1:463221124647:web:5e54ad293b174992096802"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let isAppLoading = true;
        const TEAM_PINS = {
            "8096": "Jorge", "0623": "Luis H", "6660": "Elias", "1116": "Stephanie", "0523": "Luis M"
        };

        let activeUser = localStorage.getItem('pericos_active_user');
        let currentLocation = localStorage.getItem('pericos_location') || 'LP_Willis';

        function verifyPin() {
            let pin = document.getElementById('pin-input').value;
            if (TEAM_PINS[pin]) {
                activeUser = TEAM_PINS[pin];
                localStorage.setItem('pericos_active_user', activeUser);
                location.reload();
            } else {
                document.getElementById('pin-error').style.display = 'block';
            }
        }

        // 🔥 UPGRADED: NOW INSTANT
        function switchApp(target) {
            document.querySelectorAll('.app-section').forEach(el => el.classList.remove('active-app'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active-sysco', 'active-verdura', 'active-analytics', 'active-receiving'));
            
            document.getElementById(target + '-wrapper').classList.add('active-app');
            let navBtn = document.getElementById('nav-' + target);
            if(navBtn) navBtn.classList.add('active-' + target);
            
            if (target === 'analytics') { generateAnalyticsDashboard(); } 
            else if (target !== 'receiving') { generateShoppingList(target); }
        }

        function switchLocation(loc) {
            const splash = document.getElementById('splash-screen');
            splash.style.display = 'flex'; splash.style.opacity = '1';
            currentLocation = loc;
            localStorage.setItem('pericos_location', loc);
            setTimeout(() => { location.reload(); }, 100);
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (activeUser) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('user-badge').innerText = "👤 " + activeUser;
                document.getElementById('user-badge').style.display = 'block';
                document.getElementById('location-switcher').value = currentLocation;
                loadData();
            }
        });

        function loadData() {
            db.ref(currentLocation).on('value', (snap) => {
                const data = snap.val();
                if (!data) return;
                // Full rebuild logic omitted for brevity, but stays in your live file
                if (isAppLoading) {
                    document.getElementById('splash-screen').style.display = 'none';
                    isAppLoading = false;
                }
            });
        }

        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); localStorage.setItem('restaurantCalcDarkMode', document.body.classList.contains('dark-mode')); }
        function logoutUser() { localStorage.removeItem('pericos_active_user'); location.reload(); }
        // ... (all other existing functions like generateShoppingList, resetQuantities, etc. stay in your file)
    </script>
</body>
</html>
