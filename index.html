<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Los Pericos | Master Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Pericos Hub">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="image_0.png">
    <link rel="icon" type="image/png" href="image_0.png">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --container-bg: #fff;
            --border-color: #e0e0e0;
            --input-bg: #fff;
            --primary-color: #2c3e50; 
            --danger-color: #dc3545;
            --food-color: #0056b3;
            --bar-color: #8e44ad;
            --event-color: #27ae60;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --container-bg: #1e1e1e;
            --border-color: #333;
            --input-bg: #2c2c2c;
            --primary-color: #34495e;
            --food-color: #4da3ff;
            --bar-color: #af7ac5;
            --event-color: #2ecc71;
        }

        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        
        /* LOGIN SCREEN */
        #login-screen { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; z-index: 10; }
        .pin-box { background: var(--container-bg); padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--border-color); width: 80%; max-width: 320px; text-align: center; }
        .pin-input { width: 100%; font-size: 32px; text-align: center; letter-spacing: 15px; padding: 15px; border-radius: 12px; border: 2px solid var(--primary-color); background: var(--input-bg); color: var(--text-color); margin: 20px 0; box-sizing: border-box; }
        .pin-btn { background: var(--primary-color); color: white; border: none; padding: 15px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .pin-btn:active { transform: scale(0.95); }
        #pin-error { color: var(--danger-color); font-weight: bold; margin-top: 15px; display: none; }

        /* DASHBOARD SCREEN */
        #dashboard-screen { display: none; flex-direction: column; align-items: center; text-align: center; width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user-profile { margin-bottom: 30px; background: var(--container-bg); padding: 20px; border-radius: 16px; width: 100%; box-sizing: border-box; border: 2px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .user-profile h2 { margin: 0 0 5px 0; font-size: 24px; color: var(--text-color); }
        .user-profile p { margin: 0; color: var(--result-text); font-size: 14px; font-weight: bold; }

        .app-grid { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        
        .app-btn { display: flex; align-items: center; padding: 20px; border-radius: 16px; text-decoration: none; color: white; font-size: 20px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: transform 0.2s, box-shadow 0.2s; }
        .app-btn:active { transform: scale(0.98); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .app-icon { font-size: 32px; margin-right: 15px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 12px; }
        
        .btn-food { background-color: var(--food-color); }
        .btn-bar { background-color: var(--bar-color); }
        .btn-event { background-color: var(--event-color); }

        .controls { margin-top: 40px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .control-btn { background: transparent; color: var(--text-color); border: 2px solid var(--border-color); padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .control-btn.logout { border-color: var(--danger-color); color: var(--danger-color); }
    </style>
</head>
<body>

    <script>
        if (localStorage.getItem('pericos_dark') === 'true') { document.body.classList.add('dark-mode'); }
    </script>

    <div id="login-screen">
        <div class="pin-box">
            <img src="image_0.png" alt="Los Pericos Logo" style="width:120px; border-radius:50%; margin-bottom:15px; border:3px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <h2 style="margin:0; font-size:26px;">Staff Login</h2>
            <p style="color:#666; font-size:14px; margin-top:5px;">Enter your 4-digit PIN</p>
            <input type="password" id="pin-input" class="pin-input" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="pin-btn" onclick="verifyPin()">Access Systems</button>
            <p id="pin-error">❌ Invalid PIN. Try again.</p>
        </div>
    </div>

    <div id="dashboard-screen">
        <img src="image_0.png" alt="Los Pericos Logo" style="width:80px; border-radius:50%; margin-bottom:15px; border:2px solid var(--border-color);">
        
        <div class="user-profile">
            <h2 id="display-name">Welcome</h2>
            <p id="display-role">Loading Profile...</p>
        </div>

        <div class="app-grid">
            <a href="inventory.html" class="app-btn btn-food">
                <span class="app-icon">🥩</span>
                Food Inventory
            </a>
            
            <a href="liquor.html" class="app-btn btn-bar">
                <span class="app-icon">🍸</span>
                Bar Vault
            </a>

            <a href="events.html" class="app-btn btn-event">
                <span class="app-icon">📅</span>
                Caterings & Events
            </a>
        </div>

        <div class="controls">
            <button class="control-btn" onclick="toggleDarkMode()" id="darkModeBtn">🌙 Dark Mode</button>
            <button class="control-btn logout" onclick="logoutUser()">🚪 Log Out</button>
        </div>
    </div>

    <script>
        if (localStorage.getItem('pericos_dark') === 'true') { document.getElementById('darkModeBtn').innerText = '☀️ Light Mode'; }

        const firebaseConfig = {
            apiKey: "AIzaSyAOO73pfw9yyyukquyOJfjs2nPNQn__XLM",
            authDomain: "los-pericos-46378.firebaseapp.com",
            databaseURL: "https://los-pericos-46378-default-rtdb.firebaseio.com",
            projectId: "los-pericos-46378",
            storageBucket: "los-pericos-46378.firebasestorage.app",
            messagingSenderId: "463221124647",
            appId: "1:463221124647:web:5e54ad293b174992096802"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const TEAM_PINS = {
            "8096": { name: "Jorge", role: "Manager", location: "LP_Willis" },
            "0623": { name: "Luis H", role: "Manager", location: "LP_Willis" },
            "6660": { name: "Elias", role: "Manager", location: "LP_Huntsville" },
            "1116": { name: "Stephanie", role: "Owner", location: "All" },
            "0523": { name: "Luis M", role: "Owner", location: "All" }
        };

        let activeUser = localStorage.getItem('pericos_active_user');
        let activeRole = localStorage.getItem('pericos_active_role');
        let currentLocation = localStorage.getItem('pericos_location'); 

        firebase.auth().onAuthStateChanged((user) => {
            if (user && activeUser) {
                showDashboard();
            } else {
                document.getElementById('dashboard-screen').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('pin-input').focus();
            }
        });

        function verifyPin() {
            let pin = document.getElementById('pin-input').value;
            let userData = TEAM_PINS[pin];
            
            if (userData) {
                firebase.auth().signInAnonymously().then(() => {
                    activeUser = userData.name;
                    activeRole = userData.role;
                    if (activeRole === 'Owner') { currentLocation = localStorage.getItem('pericos_location') || 'LP_Willis'; } 
                    else { currentLocation = userData.location; }

                    localStorage.setItem('pericos_active_user', activeUser);
                    localStorage.setItem('pericos_active_role', activeRole);
                    localStorage.setItem('pericos_location', currentLocation);
                    
                    document.getElementById('pin-error').style.display = 'none';
                    showDashboard();
                }).catch((error) => {
                    alert("⚠️ Cannot connect to Firebase Security. Check your internet connection.");
                });
            } else {
                document.getElementById('pin-error').style.display = 'block';
                document.getElementById('pin-input').value = '';
            }
        }

        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'flex';
            
            document.getElementById('display-name').innerText = `Hello, ${activeUser}`;
            let displayLoc = currentLocation ? currentLocation.replace('_', ' ') : 'System Access';
            document.getElementById('display-role').innerText = `${activeRole} | ${displayLoc}`;
        }

        function logoutUser() {
            if(confirm("Are you sure you want to log out of all apps?")) {
                firebase.auth().signOut().then(() => {
                    localStorage.removeItem('pericos_active_user');
                    localStorage.removeItem('pericos_active_role');
                    location.reload(); 
                });
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('darkModeBtn').innerText = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
            localStorage.setItem('pericos_dark', isDark);
        }
    </script>
</body>
</html>
