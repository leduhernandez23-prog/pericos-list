<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Los Pericos Master App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="image_0.png">
    <link rel="icon" type="image/png" href="image_0.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --container-bg: #fff;
            --border-color: #e0e0e0;
            --input-border: #ccc;
            --input-bg: #fff;
            --input-text: #333;
            --th-bg: #f8f9fa;
            --primary-color: #0056b3; 
            --primary-hover: #004494;
            --verdura-color: #008c4a;
            --analytics-color: #8e44ad;
            --receiving-color: #e67e22;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --best-deal-bg: #e8f5e9;
            --best-deal-text: #155724;
            --supplier-group-bg: #f8f9fa;
            --result-text: #666;
            --header-color: #2c3e50;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --container-bg: #1e1e1e;
            --border-color: #333;
            --input-border: #555;
            --input-bg: #2c2c2c;
            --input-text: #fff;
            --th-bg: #2a2a2a;
            --primary-color: #4da3ff;
            --verdura-color: #32cd32;
            --analytics-color: #b19cd9;
            --receiving-color: #f39c12;
            --best-deal-bg: #173a20;
            --best-deal-text: #81c784;
            --supplier-group-bg: #252525;
            --result-text: #aaa;
            --header-color: #fff;
        }

        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); max-width: 1200px; margin: 0 auto; padding: 20px; padding-bottom: 120px; transition: background-color 0.3s, color 0.3s; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); z-index: 9999999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .pin-box { background: var(--container-bg); padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--border-color); width: 80%; max-width: 320px; }
        .pin-input { width: 100%; font-size: 32px; text-align: center; letter-spacing: 15px; padding: 15px; border-radius: 12px; border: 2px solid var(--primary-color); background: var(--input-bg); color: var(--text-color); margin: 20px 0; box-sizing: border-box; }
        .pin-btn { background: var(--primary-color); color: white; border: none; padding: 15px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        #pin-error { color: var(--danger-color); font-weight: bold; margin-top: 15px; display: none; }

        #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.4s ease-out; }
        .splash-logo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--primary-color); animation: pulse-ring 2s infinite; }
        .splash-text { margin-top: 30px; font-size: 18px; font-weight: bold; color: var(--text-color); letter-spacing: 3px; text-transform: uppercase; }

        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; margin-top: 10px; flex-wrap: wrap; gap: 15px; }
        .pericos-branding { display: flex; align-items: center; gap: 15px; }
        .header-logo { height: 80px; border-radius: 50%; border: 2px solid var(--border-color); }
        .main-title { margin: 0; color: var(--header-color); font-size: 32px; font-weight: bold; text-transform: uppercase; }

        .header-utils { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; align-items: center; }
        .util-btn { background-color: transparent; color: var(--text-color); border: 2px solid var(--border-color); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; }
        
        .user-badge { background: var(--best-deal-bg); color: var(--best-deal-text); padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; display: none; align-items: center; border: 2px solid var(--success-color); }
        #location-switcher { background: var(--primary-color); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; display: none; }

        .app-section { display: none; }
        .app-section.active-app { display: block; animation: fadeIn 0.3s; }
        
        .search-bar { width: 100%; padding: 12px 16px; font-size: 16px; border: 2px solid var(--border-color); border-radius: 12px; margin-bottom: 12px; background-color: var(--input-bg); color: var(--input-text); box-sizing: border-box; }
        
        .tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 20px; overflow-x: auto; white-space: nowrap; }
        .tab-btn { background: none; border: none; padding: 12px 24px; cursor: pointer; font-size: 16px; font-weight: bold; color: var(--result-text); }
        .tab-btn.active { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); margin-bottom: -2px; }

        .item-card { background: var(--container-bg); border-radius: 16px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.06); border: 2px solid transparent; margin-bottom: 15px; position: relative; }
        .item-card.has-order { border-color: var(--success-color); }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .item-name { font-size: 18px !important; font-weight: bold; flex: 1; border: none !important; background: transparent !important; color: var(--text-color) !important; }

        .inventory-controls { display: flex; gap: 5px; background: var(--supplier-group-bg); padding: 6px 10px; border-radius: 12px; border: 2px solid var(--border-color); align-items: center; }
        .inv-input { width: 55px !important; text-align: center; border: 1px solid var(--border-color) !important; font-size: 18px !important; font-weight: bold; border-radius: 6px !important; background: var(--input-bg); color: var(--text-color); }

        .card-body { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
        .supplier-cell { border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; background: var(--supplier-group-bg); position: relative; }
        .supplier-cell.best-deal { border-color: var(--success-color); background: var(--best-deal-bg); }

        .s-result { font-weight: bold; font-size: 15px; text-align: right; color: var(--result-text); margin-top: 6px; }
        .best-deal .s-result { color: var(--best-deal-text); font-size: 16px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 12px 5px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 1000; }
        body.dark-mode .bottom-nav { background: rgba(30, 30, 30, 0.9); }
        .nav-btn { flex: 1; border: none; background: transparent; color: var(--result-text); font-size: 10px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .nav-btn.active-sysco, .nav-btn.active-events, .nav-btn.active-dashboard { color: var(--primary-color); }
        .nav-icon { font-size: 20px; }

        .fab-btn { position: fixed; bottom: 95px; right: 20px; width: 65px; height: 65px; border-radius: 50%; background: var(--primary-color); color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 32px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 999; }
        
        .file-upload-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--supplier-group-bg); border: 2px dashed var(--border-color); padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; color: var(--primary-color); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="pin-box">
            <img src="image_0.png" alt="Logo" style="width:100px; border-radius:50%; margin-bottom:10px;">
            <h2 style="margin:0;">Staff Login</h2>
            <input type="password" id="pin-input" class="pin-input" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="pin-btn" onclick="verifyPin()">Unlock App</button>
            <p id="pin-error">❌ Invalid PIN</p>
        </div>
    </div>

    <div id="splash-screen" style="display:none;">
        <img src="image_0.png" alt="Logo" class="splash-logo">
        <div class="splash-text">Syncing Data...</div>
    </div>

    <div class="header-container" id="brand-header">
        <div class="pericos-branding">
            <img src="image_0.png" alt="Logo" class="header-logo">
            <h1 class="main-title">MASTER</h1>
        </div>
        <div class="header-utils">
            <select id="location-switcher" onchange="switchLocation(this.value)">
                <option value="LP_Willis">📍 LP Willis</option>
                <option value="LP_Huntsville">📍 LP Huntsville</option>
            </select>
            <div id="user-badge" class="user-badge">👤 Unknown</div>
            <button class="util-btn" onclick="toggleDarkMode()" id="darkModeBtn">🌙 Dark Mode</button>
        </div>
    </div>

    <div id="sysco-wrapper" class="app-section sysco-wrapper active-app">
        <input type="text" class="search-bar" placeholder="🔍 Search Sysco..." onkeyup="filterTable('sysco', this.value)">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'sysco', 'Weight_sysco')">Weight</button>
            <button class="tab-btn" onclick="openTab(event, 'sysco', 'Unit_sysco')">Unit</button>
            <button class="tab-btn" onclick="openTab(event, 'sysco', 'MFE_sysco')">MFE</button>
        </div>
        <div id="Weight_sysco" class="tab-content active"><div id="weightTable_sysco" class="table-container" data-has-units="true"></div></div>
        <div id="Unit_sysco" class="tab-content"><div id="unitTable_sysco" class="table-container" data-has-units="false"></div></div>
        <div id="MFE_sysco" class="tab-content"><div id="mfeTable_sysco" class="table-container single-vendor-table" data-has-units="false"></div></div>
    </div>

    <div id="verdura-wrapper" class="app-section verdura-wrapper">
        <input type="text" class="search-bar" placeholder="🔍 Search Produce..." onkeyup="filterTable('verdura', this.value)">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'verdura', 'Weight_verdura')">Weight</button>
            <button class="tab-btn" onclick="openTab(event, 'verdura', 'Unit_verdura')">Unit</button>
            <button class="tab-btn" onclick="openTab(event, 'verdura', 'DelComal_verdura')">Del Comal</button>
        </div>
        <div id="Weight_verdura" class="tab-content active"><div id="weightTable_verdura" class="table-container" data-has-units="true"></div></div>
        <div id="Unit_verdura" class="tab-content"><div id="unitTable_verdura" class="table-container" data-has-units="false"></div></div>
        <div id="DelComal_verdura" class="tab-content"><div id="delComalTable_verdura" class="table-container single-vendor-table" data-has-units="false"></div></div>
    </div>

    <div id="events-wrapper" class="app-section events-wrapper">
        <div style="text-align:center; padding: 10px 0;"><h2 style="margin:0;">📅 New Booking</h2></div>
        <div class="item-card" style="max-width:600px; margin:0 auto; padding:25px;">
            <form id="eventForm">
                <div style="display:flex; justify-content:center; gap:20px; margin-bottom:20px;">
                    <label><input type="radio" name="eType" value="Catering" checked> Catering</label>
                    <label><input type="radio" name="eType" value="Reservation"> Reservation</label>
                </div>
                <div class="form-group"><label>Customer Name</label><input type="text" id="cName" required></div>
                <div class="row">
                    <div class="form-group"><label>Phone</label><input type="tel" id="cPhone" required></div>
                    <div class="form-group"><label>Guests</label><input type="number" id="cGuests" required></div>
                </div>
                <div class="form-group"><label>Date</label><input type="date" id="eDate" required></div>
                <div class="row">
                    <div class="form-group"><label>Start</label><input type="time" id="eStart" required></div>
                    <div class="form-group"><label>End</label><input type="time" id="eEnd"></div>
                </div>
                <div class="form-group">
                    <label class="file-upload-btn" for="fileInput">📷 Tap to Upload Photo</label>
                    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;">
                    <div id="preview-box" style="display:none; text-align:center; margin-top:10px;"><img id="img-preview" style="max-width:100%; border-radius:8px; max-height:200px;"></div>
                </div>
                <div class="form-group">
                    <button type="button" id="payToggle" style="width:100%; padding:15px; border-radius:12px; border:none; font-weight:bold; color:white; background:var(--danger-color); cursor:pointer;">UNPAID</button>
                    <input type="hidden" id="isPaid" value="false">
                </div>
                <div class="form-group"><label>Notes</label><textarea id="eNotes" rows="3"></textarea></div>
                <button type="submit" class="pin-btn" id="saveEventBtn" style="background:var(--success-color);">Save to Cloud</button>
            </form>
        </div>
    </div>

    <div id="dashboard-wrapper" class="app-section dashboard-wrapper">
        <div style="text-align:center; padding: 10px 0;"><h2 style="margin:0;">📋 Live Board</h2></div>
        <div id="dashboard-list" class="table-container"></div>
    </div>

    <div id="receiving-wrapper" class="app-section receiving-wrapper">
        <div id="receiving-list-sysco" class="table-container"></div>
        <div id="receiving-list-verdura" class="table-container"></div>
    </div>

    <div id="analytics-wrapper" class="app-section analytics-wrapper">
        <div class="item-card" style="background: var(--success-color); color: white; text-align: center;">
            <h3>Walk-In Net Worth</h3>
            <div style="font-size: 32px; font-weight: bold;" id="net-worth-display">$0.00</div>
        </div>
    </div>

    <button class="fab-btn" onclick="quickAddRow()">+</button>

    <div class="bottom-nav">
        <button id="nav-sysco" class="nav-btn active-sysco" onclick="switchApp('sysco')"><span class="nav-icon">📦</span><span>Sysco</span></button>
        <button id="nav-verdura" class="nav-btn" onclick="switchApp('verdura')"><span class="nav-icon">🥦</span><span>Produce</span></button>
        <button id="nav-events" class="nav-btn" onclick="switchApp('events')"><span class="nav-icon">📅</span><span>Add</span></button>
        <button id="nav-dashboard" class="nav-btn" onclick="switchApp('dashboard')"><span class="nav-icon">📋</span><span>Board</span></button>
        <button id="nav-receiving" class="nav-btn" onclick="switchApp('receiving')"><span class="nav-icon">🚚</span><span>Truck</span></button>
        <button id="nav-analytics" class="nav-btn" onclick="switchApp('analytics')"><span class="nav-icon">📊</span><span>Stats</span></button>
    </div>

    <script>
        // --- 1. FIREBASE INITIALIZATION ---
        const config = {
            apiKey: "AIzaSyAOO73pfw9yyyukquyOJfjs2nPNQn__XLM",
            authDomain: "los-pericos-46378.firebaseapp.com",
            databaseURL: "https://los-pericos-46378-default-rtdb.firebaseio.com",
            projectId: "los-pericos-46378",
            storageBucket: "los-pericos-46378.appspot.com"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const storage = firebase.storage();

        let isAppLoading = true;
        const TEAM_PINS = { "8096": "Jorge", "0623": "Luis H", "6660": "Elias", "1116": "Stephanie", "0523": "Luis M" };
        let activeUser = localStorage.getItem('p_user');
        let currentLocation = localStorage.getItem('p_loc') || 'LP_Willis';
        const mySyncId = Math.random().toString(36).substr(2, 9);

        // --- 2. AUTH & LOGIN ---
        function verifyPin() {
            let pin = document.getElementById('pin-input').value;
            if (TEAM_PINS[pin]) {
                activeUser = TEAM_PINS[pin];
                localStorage.setItem('p_user', activeUser);
                document.getElementById('login-screen').style.display = 'none';
                loadFromDatabase();
            } else { alert("❌ Invalid PIN"); }
        }
        if(activeUser) { document.getElementById('login-screen').style.display = 'none'; loadFromDatabase(); }

        // --- 3. NAVIGATION ---
        function switchApp(app) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active-app'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-sysco','active-verdura','active-events','active-dashboard','active-analytics','active-receiving'));
            document.getElementById(app + '-wrapper').classList.add('active-app');
            document.getElementById('nav-' + app).classList.add('active-' + app);
            if(app === 'dashboard') loadDashboard();
        }

        function openTab(evt, app, tabId) {
            let wrapper = document.getElementById(app + '-wrapper');
            wrapper.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            wrapper.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // --- 4. INVENTORY LOGIC (Restored Data Protection) ---
        function addRow(tableId, appName, pLabel, qLabel, itemName = "", parQty = "", shelfQty = "", orderQty = "", targetUnit = "oz", s1, s2, s3) {
            let container = document.getElementById(tableId);
            let hasUnits = container.getAttribute('data-has-units') === 'true';
            let card = document.createElement('div'); card.className = 'item-card';
            
            card.innerHTML = `
                <div class="card-header">
                    <input type="text" class="item-name" value="${itemName}" oninput="processRowUpdate(this)">
                    <div class="inventory-controls">
                        <input type="number" class="inv-input par-qty" value="${parQty}" placeholder="P" oninput="calcOrder(this)">
                        <input type="number" class="inv-input shelf-qty" value="${shelfQty}" placeholder="S" oninput="calcOrder(this)">
                        <input type="number" class="inv-input order-qty" value="${orderQty}" placeholder="O" oninput="processRowUpdate(this)">
                    </div>
                </div>
                <div class="card-body">
                    <div class="supplier-cell">${s1[0]} <input type="number" class="s-price" value="${s1[1]}" oninput="processRowUpdate(this)"></div>
                    <div class="supplier-cell">${s2 ? s2[0] : ''} <input type="number" class="s-price" value="${s2 ? s2[1] : ''}" oninput="processRowUpdate(this)"></div>
                </div>
            `;
            container.appendChild(card);
            processRowUpdate(card.querySelector('.item-name'), true);
        }

        function processRowUpdate(input, skipSave) {
            // Your internal calc logic would go here
            if(!skipSave && !isAppLoading) saveToDatabase();
        }

        function calcOrder(elem) {
            let card = elem.closest('.item-card');
            let p = parseFloat(card.querySelector('.par-qty').value) || 0;
            let s = parseFloat(card.querySelector('.shelf-qty').value) || 0;
            card.querySelector('.order-qty').value = Math.max(0, p - s);
            processRowUpdate(elem);
        }

        function saveToDatabase() {
            // Master save logic
        }

        function loadFromDatabase() {
            db.ref(currentLocation).on('value', snap => {
                let data = snap.val();
                if(isAppLoading) {
                    document.getElementById('splash-screen').style.display = 'none';
                    isAppLoading = false;
                    // Logic to build your Sysco/Produce tables from 'data' goes here
                }
            });
        }

        // --- 5. EVENTS & DASHBOARD LOGIC ---
        document.getElementById('payToggle').onclick = function() {
            let h = document.getElementById('isPaid'); let isP = h.value === 'true';
            h.value = isP ? 'false' : 'true';
            this.innerText = isP ? 'UNPAID' : 'PAID';
            this.style.background = isP ? 'var(--danger-color)' : 'var(--success-color)';
        };

        document.getElementById('fileInput').onchange = function(e) {
            let f = e.target.files[0];
            if (f) {
                let r = new FileReader();
                r.onload = e => { document.getElementById('img-preview').src = e.target.result; document.getElementById('preview-box').style.display = 'block'; };
                r.readAsDataURL(f);
            }
        };

        document.getElementById('eventForm').onsubmit = async function(e) {
            e.preventDefault();
            let b = document.getElementById('saveEventBtn'); b.disabled = true; b.innerText = "Saving...";
            try {
                let url = ""; let f = document.getElementById('fileInput').files[0];
                if (f) {
                    let ref = storage.ref().child(`tickets/${currentLocation}/${Date.now()}_${f.name}`);
                    await ref.put(f); url = await ref.getDownloadURL();
                }
                await db.ref(currentLocation + '/events').push({
                    createdBy: activeUser, customer: document.getElementById('cName').value,
                    phone: document.getElementById('cPhone').value, headcount: document.getElementById('cGuests').value,
                    date: document.getElementById('eDate').value, start: document.getElementById('eStart').value,
                    type: document.querySelector('input[name="eType"]:checked').value,
                    isPaid: document.getElementById('isPaid').value === 'true', photo: url, timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                alert("Saved!"); location.reload();
            } catch(e) { b.disabled = false; }
        };

        function loadDashboard() {
            db.ref(currentLocation + '/events').on('value', snap => {
                let list = document.getElementById('dashboard-list'); list.innerHTML = '';
                let d = snap.val(); if(!d) return;
                Object.keys(d).forEach(k => {
                    let ev = d[k];
                    let card = document.createElement('div'); card.className = 'item-card';
                    card.innerHTML = `<b>${ev.customer}</b> (${ev.type})<br>📅 ${ev.date} | 👥 ${ev.headcount}<br>
                        <span style="color:${ev.isPaid?'green':'red'}">${ev.isPaid?'PAID':'UNPAID'}</span>`;
                    list.appendChild(card);
                });
            });
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('p_dark', document.body.classList.contains('dark-mode'));
        }
    </script>
</body>
</html>
