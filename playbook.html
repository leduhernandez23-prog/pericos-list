<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Los Pericos | Playbook</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Playbook">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #fcfcfc;
            --toggle-bg: #f1f5f9;
            --toggle-active: #ffffff;
            --danger: #ef4444;
            --theme-transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        body.dark-mode {
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
            --toggle-bg: #111827;
            --toggle-active: #334155;
        }

        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 0; padding-bottom: 20px; display: flex; flex-direction: column; align-items: center; transition: var(--theme-transition); }

        #nav-banner { width: 100%; text-align: center; padding-top: calc(20px + env(safe-area-inset-top)); padding-bottom: 20px; background-color: var(--surface); border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        #nav-banner a { display: inline-block; background-color: #2c3e50; color: white; padding: 12px 30px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }

        .card { background-color: var(--surface); width: 90%; max-width: 600px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); border: 1px solid rgba(0,0,0,0.02); transition: var(--theme-transition); box-sizing: border-box; position: relative; }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .logo-group { display: flex; align-items: center; gap: 15px; }
        .logo { width: 44px; height: 44px; border-radius: 10px; background-color: var(--primary); display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 22px;}
        .header-text h2 { margin: 0; font-size: 18px; font-weight: 700; color: var(--text-main); }
        .header-text p { margin: 2px 0 0 0; color: var(--text-muted); font-size: 13px; }
        
        .global-badge { background: rgba(139, 92, 246, 0.15); color: var(--primary); font-size: 11px; font-weight: bold; padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(139, 92, 246, 0.3); }

        .search-bar { width: 100%; padding: 12px 16px; font-size: 16px; border: 2px solid var(--border); border-radius: 12px; margin-bottom: 15px; background-color: var(--input-bg); color: var(--text-main); box-sizing: border-box; transition: 0.3s; outline: none; }
        .search-bar:focus { border-color: var(--primary); }

        .tab-nav { display: flex; background: var(--toggle-bg); padding: 5px; border-radius: 10px; margin-bottom: 20px; transition: var(--theme-transition); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: var(--text-muted); font-size: 14px; transition: all 0.3s ease; }
        .tab-btn.active { background-color: var(--toggle-active); color: var(--primary); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }

        .playbook-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        @media (max-width: 450px) { .playbook-grid { grid-template-columns: 1fr; } }
        
        .recipe-card { background: var(--toggle-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .recipe-card:hover { transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 6px 15px rgba(0,0,0,0.08); }
        .recipe-img { width: 100%; height: 140px; background-color: var(--border); object-fit: cover; }
        .recipe-info { padding: 12px; }
        .recipe-title { font-weight: 800; font-size: 15px; color: var(--text-main); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .recipe-author { font-size: 11px; color: var(--text-muted); }

        .fab-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4); cursor: pointer; transition: 0.2s; border: none; z-index: 100; }
        .fab-btn:active { transform: scale(0.9); }

        /* MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); z-index: 999; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; padding: 15px; box-sizing: border-box; }
        .modal-box { background: var(--surface); width: 100%; max-width: 500px; border-radius: 20px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); position: relative; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
        
        .close-btn { position: absolute; top: 15px; right: 15px; background: var(--toggle-bg); border: none; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; color: var(--text-muted); cursor: pointer; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--text-main); font-size: 13px; }
        input[type="text"], select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--input-bg); color: var(--text-main); font-size: 14px; box-sizing: border-box; }
        
        .file-upload-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background-color: var(--input-bg); color: var(--primary); padding: 15px; border-radius: 8px; border: 2px dashed var(--primary); cursor: pointer; font-weight: 600; }
        input[type="file"] { display: none; }
        #imagePreview { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 10px; display: none; }

        .submit-btn { width: 100%; background: var(--primary); color: white; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* VIEW RECIPE MODAL */
        #viewImage { width: 100%; height: 250px; object-fit: cover; border-radius: 12px; background: var(--border); margin-bottom: 15px; }
        #viewTitle { font-size: 24px; font-weight: 800; margin: 0 0 5px 0; color: var(--text-main); }
        #viewMeta { font-size: 12px; color: var(--text-muted); margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        #viewSpecs { font-size: 15px; color: var(--text-main); white-space: pre-wrap; line-height: 1.6; }

        #upload-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg); z-index: 9999999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; opacity: 0; transition: opacity 0.3s ease; }
        .upload-logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); animation: pulse-ring 1.5s infinite; margin-bottom: 25px; }
        @keyframes pulse-ring { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(139, 92, 246, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); } }

    </style>
</head>
<body>

    <div id="nav-banner">
        <a href="index.html">🏠 Back to Dashboard</a>
    </div>

    <script>
        if (localStorage.getItem('pericos_dark') === 'true') { document.body.classList.add('dark-mode'); }
    </script>

    <div id="upload-overlay">
        <img src="image_0.png" class="upload-logo">
        <div style="font-size:18px; font-weight:bold; color:var(--text-main);">Uploading to Playbook...</div>
    </div>

    <div class="card" id="app-container" style="display:none;">
        
        <div class="header">
            <div class="logo-group">
                <div class="logo">📖</div>
                <div class="header-text">
                    <h2>Digital Playbook</h2>
                    <p id="user-display">Loading...</p>
                </div>
            </div>
            <div class="global-badge">🌐 Global Sync</div>
        </div>

        <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Search recipes, plating, or rules..." oninput="filterPlaybook()">

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchCategory('Bar', this)">🍸 Bar</button>
            <button class="tab-btn" onclick="switchCategory('Kitchen', this)">🥩 Kitchen</button>
            <button class="tab-btn" onclick="switchCategory('FOH', this)">📋 FOH Rules</button>
        </div>

        <div id="playbook-feed" class="playbook-grid">
            </div>

    </div>

    <button class="fab-btn admin-only" onclick="openAddModal()" style="display:none;">+</button>

    <div id="addModal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-btn" onclick="closeModals()">✖</button>
            <h2 style="margin-top:0;">Add to Playbook</h2>
            
            <div class="form-group">
                <label>Title (e.g. House Margarita)</label>
                <input type="text" id="itemTitle" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="itemCategory">
                    <option value="Bar">🍸 Bar Recipe</option>
                    <option value="Kitchen">🥩 Kitchen Plating</option>
                    <option value="FOH">📋 Front of House Rules</option>
                </select>
            </div>
            <div class="form-group">
                <label class="file-upload-btn" for="itemImage">📷 Upload Reference Photo</label>
                <input type="file" id="itemImage" accept="image/*">
                <img id="imagePreview">
            </div>
            <div class="form-group">
                <label>Ingredients & Specs</label>
                <textarea id="itemSpecs" rows="6" placeholder="List exact measurements, instructions, or rules here..."></textarea>
            </div>
            <button class="submit-btn" onclick="savePlaybookItem()">Save to Global Playbook</button>
        </div>
    </div>

    <div id="viewModal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-btn" onclick="closeModals()">✖</button>
            <img id="viewImage" src="" alt="Reference Image" style="display:none;">
            <h2 id="viewTitle">Title</h2>
            <div id="viewMeta">Uploaded by...</div>
            <div id="viewSpecs">Specs here...</div>
            <button id="deleteBtn" class="submit-btn admin-only" style="background:var(--danger); display:none; margin-top:20px;" onclick="deleteCurrentItem()">🗑️ Delete Item</button>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyAOO73pfw9yyyukquyOJfjs2nPNQn__XLM",
            authDomain: "los-pericos-46378.firebaseapp.com",
            databaseURL: "https://los-pericos-46378-default-rtdb.firebaseio.com",
            projectId: "los-pericos-46378",
            storageBucket: "los-pericos-46378.firebasestorage.app",
            messagingSenderId: "463221124647",
            appId: "1:463221124647:web:5e54ad293b174992096802"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const storage = firebase.storage();

        let activeUser = localStorage.getItem('pericos_active_user');
        let activeRole = localStorage.getItem('pericos_active_role');
        
        let allPlaybookItems = [];
        let currentCategory = 'Bar';
        let currentlyViewingId = null;

        firebase.auth().onAuthStateChanged((user) => {
            if (user && activeUser) { startApp(); } else { window.location.href = 'index.html'; }
        });

        function startApp() {
            document.getElementById('app-container').style.display = 'block';
            document.getElementById('user-display').innerText = `👤 ${activeUser}`;
            
            // Show + Button and Delete buttons only to Owners and Managers
            if (activeRole === 'Owner' || activeRole === 'Manager') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
            }

            loadPlaybookData();
        }

        // GLOBAL SYNC: Always reads from 'global_playbook'
        function loadPlaybookData() {
            db.ref('global_playbook').on('value', snap => {
                allPlaybookItems = [];
                snap.forEach(child => { allPlaybookItems.push({ id: child.key, ...child.val() }); });
                renderPlaybook();
            });
        }

        function switchCategory(cat, btnElem) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElem.classList.add('active');
            renderPlaybook();
        }

        function filterPlaybook() { renderPlaybook(); }

        function renderPlaybook() {
            const container = document.getElementById('playbook-feed');
            const searchQ = document.getElementById('searchInput').value.toLowerCase();
            let html = '';

            let filtered = allPlaybookItems.filter(item => item.category === currentCategory);
            
            if (searchQ) {
                filtered = filtered.filter(item => item.title.toLowerCase().includes(searchQ) || item.specs.toLowerCase().includes(searchQ));
            }

            filtered.forEach(item => {
                let imgHtml = item.photo ? `<img src="${item.photo}" class="recipe-img">` : `<div class="recipe-img" style="display:flex;align-items:center;justify-content:center;font-size:40px;">${item.category==='Bar'?'🍸':item.category==='Kitchen'?'🥩':'📋'}</div>`;
                
                html += `
                    <div class="recipe-card" onclick="openViewModal('${item.id}')">
                        ${imgHtml}
                        <div class="recipe-info">
                            <div class="recipe-title">${item.title}</div>
                            <div class="recipe-author">By ${item.author.split(' ')[0]}</div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html || '<p style="grid-column: span 2; text-align:center; color:var(--text-muted); padding: 20px;">No items found in this category.</p>';
        }

        // IMAGE PREVIEW
        document.getElementById('itemImage').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const preview = document.getElementById('imagePreview');
                preview.src = ev.target.result;
                preview.style.display = 'block';
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        };

        function openAddModal() {
            document.getElementById('addModal').style.display = 'flex';
            setTimeout(() => document.getElementById('addModal').style.opacity = '1', 10);
        }

        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => {
                m.style.opacity = '0';
                setTimeout(() => m.style.display = 'none', 300);
            });
            currentlyViewingId = null;
        }

        async function savePlaybookItem() {
            const title = document.getElementById('itemTitle').value.trim();
            const cat = document.getElementById('itemCategory').value;
            const specs = document.getElementById('itemSpecs').value.trim();
            const file = document.getElementById('itemImage').files[0];

            if(!title || !specs) { alert("Title and Specs are required!"); return; }

            const overlay = document.getElementById('upload-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.style.opacity = '1', 10);

            const ref = db.ref('global_playbook').push();
            let photoUrl = null;

            if (file) {
                const storageRef = storage.ref(`playbook_images/${Date.now()}.jpg`);
                await storageRef.put(file);
                photoUrl = await storageRef.getDownloadURL();
            }

            await ref.set({
                title: title,
                category: cat,
                specs: specs,
                photo: photoUrl,
                author: activeUser,
                date: new Date().toLocaleDateString('en-US')
            });

            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 300);
            
            // Reset form
            document.getElementById('itemTitle').value = '';
            document.getElementById('itemSpecs').value = '';
            document.getElementById('itemImage').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            closeModals();
        }

        function openViewModal(id) {
            const item = allPlaybookItems.find(i => i.id === id);
            if(!item) return;

            currentlyViewingId = id;
            
            const img = document.getElementById('viewImage');
            if (item.photo) { img.src = item.photo; img.style.display = 'block'; } 
            else { img.style.display = 'none'; }

            document.getElementById('viewTitle').innerText = item.title;
            document.getElementById('viewMeta').innerText = `Uploaded by ${item.author} on ${item.date}`;
            document.getElementById('viewSpecs').innerText = item.specs;

            document.getElementById('viewModal').style.display = 'flex';
            setTimeout(() => document.getElementById('viewModal').style.opacity = '1', 10);
        }

        function deleteCurrentItem() {
            if(!currentlyViewingId) return;
            if(confirm("Are you sure you want to delete this recipe from the Global Playbook?")) {
                db.ref('global_playbook/' + currentlyViewingId).remove();
                closeModals();
            }
        }
    </script>
</body>
</html>
